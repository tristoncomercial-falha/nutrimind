/* ── NUTRIMIND IA – Micro CSS (substitui Tailwind CDN) ── */

/* Layout */
.flex{display:flex}.flex-col{flex-direction:column}.flex-1{flex:1 1 0%}
.flex-shrink-0{flex-shrink:0}.flex-wrap{flex-wrap:wrap}.flex-none{flex:none}
.grid{display:grid}.block{display:block}.inline-flex{display:inline-flex}
.hidden{display:none}.relative{position:relative}.absolute{position:absolute}
.fixed{position:fixed}.sticky{position:sticky}.overflow-hidden{overflow:hidden}
.overflow-auto{overflow:auto}.overflow-x-auto{overflow-x:auto}
.inset-0{inset:0}.top-0{top:0}.bottom-0{bottom:0}.left-0{left:0}.right-0{right:0}
.-top-2{top:-8px}.-right-2{right:-8px}.z-10{z-index:10}.z-50{z-index:50}.z-60{z-index:60}

/* Flexbox alignment */
.items-center{align-items:center}.items-start{align-items:flex-start}
.items-end{align-items:flex-end}.items-baseline{align-items:baseline}
.justify-center{justify-content:center}.justify-between{justify-content:space-between}
.justify-around{justify-content:space-around}.justify-end{justify-content:flex-end}
.self-center{align-self:center}

/* Grid */
.grid-cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}
.grid-cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}
.grid-cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}

/* Gap */
.gap-1{gap:4px}.gap-1\.5{gap:6px}.gap-2{gap:8px}.gap-3{gap:12px}
.gap-4{gap:16px}.gap-5{gap:20px}.gap-6{gap:24px}

/* Spacing – padding */
.p-2{padding:8px}.p-3{padding:12px}.p-4{padding:16px}.p-5{padding:20px}
.p-6{padding:24px}.p-8{padding:32px}
.px-2{padding-left:8px;padding-right:8px}.px-3{padding-left:12px;padding-right:12px}
.px-4{padding-left:16px;padding-right:16px}.px-5{padding-left:20px;padding-right:20px}
.px-6{padding-left:24px;padding-right:24px}.px-8{padding-left:32px;padding-right:32px}
.py-1{padding-top:4px;padding-bottom:4px}.py-1\.5{padding-top:6px;padding-bottom:6px}
.py-2{padding-top:8px;padding-bottom:8px}.py-3{padding-top:12px;padding-bottom:12px}
.py-4{padding-top:16px;padding-bottom:16px}.py-6{padding-top:24px;padding-bottom:24px}
.py-8{padding-top:32px;padding-bottom:32px}.py-10{padding-top:40px;padding-bottom:40px}
.pt-3{padding-top:12px}.pt-4{padding-top:16px}.pt-6{padding-top:24px}
.pb-1{padding-bottom:4px}.pb-2{padding-bottom:8px}.pb-3{padding-bottom:12px}
.pb-4{padding-bottom:16px}.pb-8{padding-bottom:32px}.pb-10{padding-bottom:40px}
.pb-24{padding-bottom:96px}.pl-6{padding-left:24px}

/* Spacing – margin */
.m-0{margin:0}.mx-auto{margin-left:auto;margin-right:auto}
.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}
.mt-4{margin-top:16px}.mt-5{margin-top:20px}.mt-6{margin-top:24px}
.mt-8{margin-top:32px}.mt-10{margin-top:40px}
.mb-0{margin-bottom:0}.mb-1{margin-bottom:4px}.mb-2{margin-bottom:8px}
.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-5{margin-bottom:20px}
.mb-6{margin-bottom:24px}.mb-8{margin-bottom:32px}
.ml-auto{margin-left:auto}.ml-2{margin-left:8px}.mr-2{margin-right:8px}

/* Sizing */
.w-full{width:100%}.h-full{height:100%}
.w-4{width:16px}.h-4{height:16px}.w-5{width:20px}.h-5{height:20px}
.w-6{width:24px}.h-6{height:24px}.w-7{width:28px}.h-7{height:28px}
.w-8{width:32px}.h-8{height:32px}.w-9{width:36px}.h-9{height:36px}
.w-10{width:40px}.h-10{height:40px}.w-11{width:44px}.h-11{height:44px}
.w-12{width:48px}.h-12{height:48px}.w-14{width:56px}.h-14{height:56px}
.w-16{width:64px}.h-16{height:64px}.w-20{width:80px}.h-20{height:80px}
.w-24{width:96px}.h-24{height:96px}.w-32{width:128px}.h-32{height:128px}
.max-w-sm{max-width:384px}.max-w-md{max-width:448px}
.min-w-0{min-width:0}.max-h-full{max-height:100%}

/* Border radius */
.rounded{border-radius:4px}.rounded-lg{border-radius:8px}
.rounded-xl{border-radius:12px}.rounded-2xl{border-radius:16px}
.rounded-3xl{border-radius:24px}.rounded-full{border-radius:9999px}

/* Border */
.border{border-width:1px;border-style:solid}.border-b{border-bottom-width:1px;border-bottom-style:solid}
.border-t{border-top-width:1px;border-top-style:solid}.border-none{border:none}

/* Typography */
.text-\[9px\]{font-size:9px;line-height:1.4}.text-\[10px\]{font-size:10px;line-height:1.4}
.text-\[10\.5px\]{font-size:10.5px;line-height:1.4}
.text-xs{font-size:12px;line-height:16px}.text-sm{font-size:14px;line-height:20px}
.text-base{font-size:16px;line-height:24px}.text-lg{font-size:18px;line-height:28px}
.text-xl{font-size:20px;line-height:28px}.text-2xl{font-size:24px;line-height:32px}
.text-3xl{font-size:30px;line-height:36px}.text-4xl{font-size:36px;line-height:40px}
.text-5xl{font-size:48px;line-height:1}
.font-normal{font-weight:400}.font-semibold{font-weight:600}
.font-bold{font-weight:700}.font-extrabold{font-weight:800}
.italic{font-style:italic}.not-italic{font-style:normal}
.tracking-tight{letter-spacing:-0.025em}.tracking-wider{letter-spacing:0.05em}
.tracking-widest{letter-spacing:0.1em}.tracking-normal{letter-spacing:0}
.uppercase{text-transform:uppercase}.lowercase{text-transform:lowercase}
.capitalize{text-transform:capitalize}.normal-case{text-transform:none}
.text-left{text-align:left}.text-center{text-align:center}.text-right{text-align:right}
.leading-none{line-height:1}.leading-tight{line-height:1.25}.leading-relaxed{line-height:1.625}
.truncate{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.whitespace-nowrap{white-space:nowrap}.whitespace-pre-wrap{white-space:pre-wrap}
.text-white{color:#fff}.text-black{color:#000}
.underline{text-decoration:underline}.line-through{text-decoration:line-through}
.no-underline{text-decoration:none}

/* Vertical align */
.align-middle{vertical-align:middle}.align-top{vertical-align:top}

/* Colors – text */
.text-red-400{color:#f87171}.text-red-500{color:#ef4444}
.text-orange-400{color:#fb923c}.text-orange-500{color:#f97316}
.text-yellow-400{color:#facc15}.text-yellow-500{color:#eab308}
.text-green-400{color:#4ade80}.text-green-500{color:#22c55e}
.text-blue-400{color:#60a5fa}.text-blue-500{color:#3b82f6}
.text-purple-400{color:#c084fc}.text-purple-500{color:#a855f7}
.text-gray-400{color:#9ca3af}.text-gray-500{color:#6b7280}
.text-gray-600{color:#4b5563}.text-gray-700{color:#374151}

/* Colors – background */
.bg-white{background-color:#fff}.bg-transparent{background-color:transparent}
.bg-red-50{background-color:#fef2f2}.bg-red-100{background-color:#fee2e2}
.bg-red-500{background-color:#ef4444}
.bg-orange-50{background-color:#fff7ed}
.bg-yellow-50{background-color:#fefce8}.bg-yellow-100{background-color:#fef9c3}
.bg-green-50{background-color:#f0fdf4}.bg-green-100{background-color:#dcfce7}
.bg-blue-50{background-color:#eff6ff}.bg-blue-100{background-color:#dbeafe}
.bg-purple-50{background-color:#faf5ff}
.bg-gray-50{background-color:#f9fafb}.bg-gray-100{background-color:#f3f4f6}

/* Opacity */
.opacity-0{opacity:0}.opacity-25{opacity:.25}.opacity-30{opacity:.3}
.opacity-40{opacity:.4}.opacity-50{opacity:.5}.opacity-60{opacity:.6}
.opacity-70{opacity:.7}.opacity-75{opacity:.75}.opacity-80{opacity:.8}
.opacity-90{opacity:.9}.opacity-100{opacity:1}

/* Shadow */
.shadow{box-shadow:0 1px 3px rgba(0,0,0,.1),0 1px 2px rgba(0,0,0,.06)}
.shadow-lg{box-shadow:0 10px 15px rgba(0,0,0,.1),0 4px 6px rgba(0,0,0,.05)}
.shadow-xl{box-shadow:0 20px 25px rgba(0,0,0,.1),0 10px 10px rgba(0,0,0,.04)}
.shadow-none{box-shadow:none}

/* Misc */
.cursor-pointer{cursor:pointer}.cursor-default{cursor:default}
.select-none{user-select:none}.pointer-events-none{pointer-events:none}
.resize-none{resize:none}.resize-y{resize:vertical}
.resize{resize:both}.outline-none{outline:none}
.transition{transition:all .15s ease-in-out}
.transition-all{transition:all .15s ease-in-out}
.duration-200{transition-duration:200ms}.duration-300{transition-duration:300ms}
.ease-in-out{transition-timing-function:ease-in-out}
.space-y-1>*+*{margin-top:4px}.space-y-2>*+*{margin-top:8px}
.space-y-3>*+*{margin-top:12px}.space-y-4>*+*{margin-top:16px}
.space-y-5>*+*{margin-top:20px}.space-y-6>*+*{margin-top:24px}
.space-x-2>*+*{margin-left:8px}.space-x-3>*+*{margin-left:12px}
.animate-bounce{animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(-25%);animation-timing-function:cubic-bezier(.8,0,1,1)}50%{transform:translateY(0);animation-timing-function:cubic-bezier(0,0,.2,1)}}
.animate-spin{animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.aspect-square{aspect-ratio:1/1}
.object-cover{object-fit:cover}.object-contain{object-fit:contain}
.list-none{list-style:none}.list-disc{list-style:disc}

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *,body,html{font-family:'Plus Jakarta Sans',sans-serif;box-sizing:border-box}
    html,body{height:100%;margin:0;background:#f0f7f1}
    :root{
      --green:#22c55e;--green-dark:#14532d;--green-mid:#15803d;
      --green-light:#dcfce7;--green-card:#f0fdf4;
      --accent:#4ade80;--gold:#f59e0b;
      --text:#0a1f0a;--text-2:#1f3a1f;--text-3:#4a6b4a;
      --border:#c8e6c9;--card:#fff;--bg:#f0f7f1;--bg2:#e8f5e9;
      --dark:#0a1f0a;--dark2:#14532d;
      --shadow:0 4px 24px rgba(20,83,45,.10);
      --shadow-lg:0 8px 40px rgba(20,83,45,.18)
    }

    /* ── ANIMAÇÕES SOFISTICADAS ──────────────────────────────── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    /* ── COMEMORAÇÃO PÓS-ASSINATURA ── */
    @keyframes celebraPop{0%{opacity:0;transform:scale(.7)}100%{opacity:1;transform:scale(1)}}
    @keyframes fadeOutCelebra{to{opacity:0}}
    @keyframes confeteCai{0%{opacity:1;top:-10%}100%{opacity:.9;top:110%}}
    #celebracao-ov .confete{position:absolute;top:-10%;border-radius:2px;animation-name:confeteCai;animation-timing-function:linear;animation-iteration-count:1}
    @keyframes slideLeft{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideRight{from{opacity:0;transform:translateX(-30px)}to{opacity:1;transform:translateX(0)}}
    @keyframes scaleIn{from{opacity:0;transform:scale(.88)}to{opacity:1;transform:scale(1)}}
    @keyframes ringAnim{from{stroke-dashoffset:440}to{stroke-dashoffset:var(--ring-offset,440)}}
    @keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes pulse2{0%,100%{transform:scale(1);box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{transform:scale(1.03);box-shadow:0 0 0 10px rgba(34,197,94,0)}}
    @keyframes breathe{0%,100%{opacity:1}50%{opacity:.65}}
    @keyframes gradientShift{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes checkBounce{0%{transform:scale(0) rotate(-10deg)}60%{transform:scale(1.25) rotate(3deg)}100%{transform:scale(1) rotate(0)}}
    @keyframes toastSlide{from{opacity:0;transform:translateX(-50%) translateY(14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    @keyframes logoReveal{0%{opacity:0;letter-spacing:.3em}100%{opacity:1;letter-spacing:normal}}
    @keyframes barFill{from{width:0}to{width:var(--bar-w,0%)}}
    @keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(12px,-8px) scale(1.05)}66%{transform:translate(-8px,6px) scale(.97)}}
    @keyframes cardHover{from{transform:translateY(0)}to{transform:translateY(-4px)}}
    @keyframes dotPulse{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}

    .fade-up{animation:fadeUp .5s cubic-bezier(.34,1.4,.64,1) both}
    .fade-in{animation:fadeIn .4s ease both}
    .scale-in{animation:scaleIn .4s cubic-bezier(.34,1.4,.64,1) both}
    .slide-left{animation:slideLeft .4s cubic-bezier(.34,1.4,.64,1) both}
    .float{animation:floatY 3s ease-in-out infinite}
    .breathe{animation:breathe 2.5s ease-in-out infinite}
    .pulse-btn{animation:pulse2 2.4s ease-in-out infinite}
    .shimmer-text{background:linear-gradient(90deg,#14532d,#22c55e,#4ade80,#22c55e,#14532d);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
    .gradient-anim{background:linear-gradient(135deg,#14532d,#15803d,#22c55e,#16a34a);background-size:300% 300%;animation:gradientShift 6s ease infinite}
    .ring-anim{animation:ringAnim 1.4s cubic-bezier(.4,0,.2,1) both}

    .d1{animation-delay:.07s}.d2{animation-delay:.14s}.d3{animation-delay:.21s}
    .d4{animation-delay:.28s}.d5{animation-delay:.35s}.d6{animation-delay:.42s}
    .d7{animation-delay:.49s}.d8{animation-delay:.56s}

    /* ── CARDS ───────────────────────────────────────────────── */
    .card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;box-shadow:var(--shadow)}
    .card-dark{background:linear-gradient(135deg,#0a1f0a 0%,#14532d 60%,#15803d 100%);border-radius:20px;box-shadow:var(--shadow-lg)}
    .card-green{background:linear-gradient(135deg,#15803d 0%,#16a34a 50%,#22c55e 100%);border-radius:20px;box-shadow:var(--shadow-lg)}
    .card-glass{background:rgba(255,255,255,.85);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1.5px solid rgba(255,255,255,.6);border-radius:20px;box-shadow:var(--shadow)}

    /* ── BOTÕES ──────────────────────────────────────────────── */
    .btn-green{background:linear-gradient(135deg,#16a34a 0%,#15803d 100%);color:#fff;font-weight:700;border-radius:14px;border:none;cursor:pointer;transition:all .22s cubic-bezier(.34,1.4,.64,1);font-family:inherit;letter-spacing:.01em}
    .btn-green:active{transform:scale(.96)}
    .btn-green:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(22,163,74,.35)}
    .btn-ghost{background:var(--green-light);color:var(--green-dark);font-weight:700;border-radius:14px;border:none;cursor:pointer;transition:all .22s;font-family:inherit}
    .btn-ghost:active{transform:scale(.97)}
    .btn-outline{background:transparent;color:var(--green-dark);font-weight:700;border-radius:14px;border:2px solid var(--green-mid);cursor:pointer;transition:all .22s;font-family:inherit}

    /* ── FORMULÁRIOS ─────────────────────────────────────────── */
    .fi{position:relative;margin-bottom:18px}
    .fi input,.fi select{width:100%;padding:14px 14px 6px;background:var(--bg2);border:1.5px solid var(--border);border-radius:14px;color:var(--text);font-size:15px;outline:none;transition:all .25s;font-family:inherit}
    .fi input:focus,.fi select:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
    .fi label{position:absolute;top:8px;left:14px;font-size:10px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.06em;pointer-events:none}
    .nutr-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;outline:none;color:var(--text);background:var(--bg2);transition:all .2s}
    .nutr-input:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(34,197,94,.12)}
    .nutr-textarea{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;font-family:inherit;outline:none;color:var(--text);background:var(--bg2);resize:vertical;min-height:80px;transition:all .2s}
    .nutr-textarea:focus{border-color:var(--green-mid);box-shadow:0 0 0 3px rgba(34,197,94,.12)}

    /* ── NAV ─────────────────────────────────────────────────── */
    .nav-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid rgba(200,230,201,.6);display:flex;justify-content:space-around;padding:8px 0 20px;z-index:50;box-shadow:0 -4px 24px rgba(20,83,45,.08)}
    .nav-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;border:none;background:transparent;cursor:pointer;font-family:inherit;transition:all .2s;border-radius:12px}
    .nav-btn span{font-size:10px;font-weight:700;letter-spacing:.02em}
    .nav-btn.active{color:var(--green-mid)}
    .nav-btn.active i{filter:drop-shadow(0 2px 6px rgba(34,197,94,.4))}
    .nav-btn:not(.active){color:var(--text-3)}

    /* ── COMPONENTES ─────────────────────────────────────────── */
    input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--green-light);outline:none}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#15803d);border:3px solid #fff;box-shadow:0 2px 8px rgba(34,197,94,.4);cursor:pointer}
    .pill{background:var(--green-light);color:var(--green-dark);border-radius:999px;font-size:11px;font-weight:700;padding:3px 10px;letter-spacing:.02em}
    .plan-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:99px;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase}
    .tip-card{border-left:4px solid var(--green);background:linear-gradient(135deg,var(--green-card),#f0fdf4);border-radius:0 16px 16px 0;padding:14px 16px;box-shadow:var(--shadow)}
    .pbh{height:8px;background:var(--green-light);border-radius:4px;overflow:hidden}
    .pbf{height:100%;background:linear-gradient(90deg,#22c55e,#15803d);border-radius:4px;transition:width .8s cubic-bezier(.34,1.4,.64,1)}
    .imc-bar{height:10px;border-radius:5px;position:relative;overflow:hidden;background:linear-gradient(90deg,#60a5fa 0%,#22c55e 35%,#fbbf24 65%,#ef4444 100%)}
    .imc-mk{position:absolute;top:-3px;width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid var(--dark);box-shadow:0 2px 8px rgba(0,0,0,.2);transition:left .8s cubic-bezier(.34,1.4,.64,1)}
    .modal-ov{position:fixed;inset:0;background:rgba(10,31,10,.6);backdrop-filter:blur(6px);z-index:60;display:flex;align-items:flex-end}
    .modal-box{width:100%;background:#fff;border-radius:28px 28px 0 0;padding:24px;animation:fadeUp .38s cubic-bezier(.34,1.4,.64,1)}
    .ci{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:14px;cursor:pointer;border:1.5px solid var(--border);background:var(--card);margin-bottom:8px;transition:all .22s}
    .ci.ck{background:var(--green-light);border-color:var(--green)}
    .cb{width:22px;height:22px;border-radius:7px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .22s}
    .ci.ck .cb{background:var(--green-mid);border-color:var(--green-mid)}
    .ci-icon{display:none}

// Fórmula MET: kcal = MET × peso(kg) × horas
function calcActKcal(actId, intensidade, minutos){
  const act=ACTIVITIES.find(a=>a.id===actId);
  if(!act) return 0;
  const met=act.met[intensidade]||act.met.moderado;
  return Math.round(met * state.weight * (minutos/60));
}

function addActivity(actId, intensidade, minutos){
  const act=ACTIVITIES.find(a=>a.id===actId);
  if(!act) return;
  const kcal=calcActKcal(actId,intensidade,minutos);
  const today=hojeLocal();
  const entry={id:actId,name:act.name,e:act.e,cat:act.cat,intensidade,minutos,kcal,date:today,ts:Date.now()};
  const actLog=[...(state.actLog||[]),entry];
  // Atualiza log semanal de atividades
  const actWeek=[...(state.actWeek||[])];
  let dw=actWeek.find(w=>w.date===today);
  if(!dw){dw={date:today,kcal:0,min:0};actWeek.push(dw);}
  dw.kcal+=kcal; dw.min+=minutos;
  state.actLog=actLog; state.actWeek=actWeek;
  state.showActModal=false; state.selActId=null; state.selIntensidade='moderado'; state.selMinutos=30;
  saveState(state); render();
  showToast(`✓ ${act.name} · ${kcal} kcal queimadas`);
}

function removeActivity(idx){
  const log=[...(state.actLog||[])];
  const removed=log.splice(idx,1)[0];
  if(removed){
    // Recalcula actWeek para o dia removido
    const actWeek=[...(state.actWeek||[])];
    const dw=actWeek.find(w=>w.date===removed.date);
    if(dw){dw.kcal=Math.max(0,dw.kcal-removed.kcal);dw.min=Math.max(0,dw.min-removed.minutos);}
    state.actLog=log; state.actWeek=actWeek;
    saveState(state); render();
    showToast(`Removido: ${removed.name}`);
  }
}

// Conclui um treino gerado (IA ou personal) com nome e kcal corretos
function completeWorkout(nome, kcal, minutos){
  const today=hojeLocal();
  const entry={id:'workout',name:nome||'Treino concluído',e:'🏋️',cat:'musculacao',intensidade:'moderado',minutos:minutos||45,kcal:kcal||300,date:today,ts:Date.now()};
  const actLog=[...(state.actLog||[]),entry];
  const actWeek=[...(state.actWeek||[])];
  let dw=actWeek.find(w=>w.date===today);
  if(!dw){dw={date:today,kcal:0,min:0};actWeek.push(dw);}
  dw.kcal+=entry.kcal; dw.min+=entry.minutos;
  state.actLog=actLog; state.actWeek=actWeek;
  saveState(state); render();
  showToast(`✓ ${entry.name} · ${entry.kcal} kcal queimadas`);
}

// ─── CÁLCULO DE ÁGUA POR IMC (base científica consolidada) ───────────────────
function calcWaterGoal(){
  const {weight,height,age,goal}=state;
  const h=height/100;
  const imc=weight/(h*h);
  // Peso ideal (IMC alvo 22)
  const pi=22*h*h;

  let mlPerKg, pesoBase, nota, formula;

  if(imc<18.5){
    // Abaixo do peso: 40ml/kg peso atual (maior necessidade para recuperação nutricional)
    mlPerKg=40; pesoBase=weight;
    nota="Abaixo do peso: 40ml/kg para suportar a recuperação nutricional.";
    formula="40ml × peso atual";
  } else if(imc<=24.9){
    // Normal: 35ml/kg peso atual
    mlPerKg=35; pesoBase=weight;
    nota="Peso normal: fórmula padrão 35ml/kg.";
    formula="35ml × peso atual";
  } else if(imc<=29.9){
    // Sobrepeso: 35ml/kg + 300ml extra pelo metabolismo elevado
    mlPerKg=35; pesoBase=weight;
    nota="Sobrepeso: 35ml/kg + 300ml pelo metabolismo aumentado.";
    formula="(35ml × peso atual) + 300ml";
  } else if(imc<=34.9){
    // Obesidade I: usar Peso Ajustado (PAJ = PI + 0,4 × (PA - PI))
    const paj=pi+0.4*(weight-pi);
    mlPerKg=35; pesoBase=paj;
    nota="Obesidade I: Peso Ajustado (PAJ) evita superestimar. Tecido adiposo tem 10% de água vs 75% no músculo.";
    formula="35ml × PAJ (PI + 0,4 × (PA − PI))";
  } else if(imc<=39.9){
    // Obesidade II: PAJ com 30ml para evitar sobrecarga gástrica
    const paj=pi+0.4*(weight-pi);
    mlPerKg=30; pesoBase=paj;
    nota="Obesidade II: 30ml/kg sobre o PAJ. Evita sobrecarga gástrica e hiponatremia por diluição.";
    formula="30ml × PAJ";
  } else {
    // Obesidade III: apenas peso ideal, avaliação médica obrigatória
    mlPerKg=30; pesoBase=pi;
    nota="⚠️ Obesidade III: calcular sobre peso ideal. Avaliação médica obrigatória — pode haver restrição de fluidos.";
    formula="30ml × Peso Ideal";
  }

  // Ajuste por idade
  let idadeAdj=0;
  if(age>=60) { mlPerKg=Math.min(mlPerKg,30); nota+=" Idoso: máx. 30ml/kg (sede reduzida)."; idadeAdj=-5; }

  // Cálculo base
  let totalMl=Math.round(mlPerKg*pesoBase);

  // Ajuste sobrepeso
  if(imc>25&&imc<=29.9) totalMl+=300;

  // Ajuste por objetivo
  let goalAdj=0;
  if(goal==='hyper'||goal==='mass'){ totalMl+=300; goalAdj=300; }
  if(goal==='slim'){ totalMl+=200; goalAdj=200; }

  // Converter em copos de 250ml
  const copos=Math.max(6,Math.round(totalMl/250));
  const litros=(copos*250/1000).toFixed(1);

  return {totalMl,copos,litros,nota,formula,imc:imc.toFixed(1),pi:pi.toFixed(1),mlPerKg,pesoBase:pesoBase.toFixed(1),goalAdj};
}

function esc(s){
  if(s==null) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;')
    .replace(/'/g,'&#39;');
}

// toISOString() usa UTC: no Brasil (UTC-3), às 21:00 já seria "amanhã".
// Estas funções usam o calendário local do aparelho.
function dataLocal(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function hojeLocal(){ return dataLocal(new Date()); }

// diário (refeições, água) começa limpo. O histórico semanal é preservado
// porque cada registro já grava no weekLog na hora.
function checkNovoDia(){
  const hoje=hojeLocal();
  if(!state.logDate){
    // Migração de versões antigas: infere o dia pela última refeição registrada
    const lastTs=(state.todayLog||[]).reduce((m,l)=>Math.max(m,l.ts||0),0);
    state.logDate=lastTs?dataLocal(new Date(lastTs)):hoje;
  }
  if(state.logDate!==hoje){
    state.logDate=hoje;
    state.todayLog=[];
    state.waterToday=0;
    saveState(state);
    return true;   // virou o dia
  }
  return false;
}

function calcTDEE(){
  const{weight,height,age,sex,activity,goal}=state;
  let bmr=sex==='M'?10*weight+6.25*height-5*age+5:10*weight+6.25*height-5*age-161;
  const f={sedentary:1.2,light:1.375,moderate:1.55,active:1.725,very_active:1.9};
  let tdee=Math.round(bmr*(f[activity]||1.55));
  let target=tdee;
  if(goal==='hyper') target=tdee+300;
  else if(goal==='slim') target=tdee-500;
  else if(goal==='mass') target=tdee+700;
  return{tdee,targetCal:Math.max(target,1200)};
}

function calcIMC(){
  const h=state.height/100;
  const imc=state.weight/(h*h);
  const cls=IMC_CLS.find(c=>imc<=c.max)||IMC_CLS[IMC_CLS.length-1];
  return{imc:imc.toFixed(1),cls,pesoIdealMin:(18.5*h*h).toFixed(1),pesoIdealMax:(24.9*h*h).toFixed(1)};
}

// Fecha o que estiver aberto (modais) ou volta de tela, na ordem certa
function handleBack(){
  // 1. Modais abertos têm prioridade — fecha o primeiro encontrado
  const modais=['showImportModal','showMultiModal','showJunkModal','showAddMealModal','showWaterModal','showWeightModal','showActModal','showUpgradeModal','showAllFoods'];
  for(const m of modais){
    if(state[m]){ setState({[m]:false}); return true; }
  }
  // 2. Tela de detalhe de alimento aberta
  if(state.selFoodId){ setState({selFoodId:null}); return true; }
  // 3. Tela de Termos/Privacidade volta para onde estava
  if(state.screen==='legal'){ voltarDoLegal(); return true; }
  // 4. Telas secundárias voltam para a home
  if(state.screen==='main' && state.tab && state.tab!=='home'){
    setState({tab:'home'}); return true;
  }
  if(state.tab==='progress'||state.tab==='profile'){ setState({tab:'home'}); return true; }
  // 5. Já está na home — deixa o navegador sair normalmente
  return false;
}

function addFoodById(foodId){
  const food=FOODS.find(f=>f.id===foodId);
  if(!food){alert('Alimento não encontrado. Tente novamente.');return;}
  const grams=state.selGrams||100;
  const cal=Math.round(food.cal*grams/100);
  const entry={
    name:food.n,cal,meal:state.selMeal,grams,
    p:Math.round(food.p*grams/100*10)/10,
    c:Math.round(food.c*grams/100*10)/10,
    g:Math.round(food.g*grams/100*10)/10,
    e:food.e||'🍽️',
    ts:Date.now()
  };
  const log=[...state.todayLog,entry];
  const today=hojeLocal();
  const weekLog=[...(state.weekLog||[])];
  let de=weekLog.find(w=>w.date===today);
  if(!de){de={date:today,cal:0,p:0,c:0,g:0};weekLog.push(de);}
  de.cal+=cal;de.p+=entry.p;de.c+=entry.c;de.g+=entry.g;

  // sem pular para a home — o usuário continua de onde estava.
  state.todayLog=log;
  state.weekLog=weekLog;
  state.selFoodId=null;
  saveState(state);
  render();
  showToast(`✓ ${food.n} · ${cal} kcal → ${state.selMeal}`);

  const qty=state.junkQty||1;
  const cal=Math.round(food.cal*qty);

    p:Math.round(food.p*qty*10)/10,

    g:Math.round(food.g*qty*10)/10,
    e:food.e||'🍔',
    junk:true,
    ts:Date.now()
  };
  const log=[...state.todayLog,entry];
  const today=hojeLocal();
  const weekLog=[...(state.weekLog||[])];
  let de=weekLog.find(w=>w.date===today);
  if(!de){de={date:today,cal:0,p:0,c:0,g:0};weekLog.push(de);}
  de.cal+=cal;de.p+=entry.p;de.c+=entry.c;de.g+=entry.g;
  // Marca o dia como "dia do lixo" no histórico

  // quando modais abrem/fecham e mudam a contagem de elementos roláveis.
  const mainScroller=[...app.querySelectorAll('.overflow-auto')]
    .sort((a,b)=>b.scrollHeight-a.scrollHeight)[0];
  const prevScroll=mainScroller?mainScroller.scrollTop:0;

  if(state.screen==='login') renderLogin(app);
  else if(state.screen==='onboarding') renderOnboarding(app);
  else if(state.screen==='legal') renderLegal(app);
  else renderMain(app);

  // Restaura o scroll do container principal após re-renderizar
  if(prevScroll>0){
    const newScroller=[...app.querySelectorAll('.overflow-auto')]
      .sort((a,b)=>b.scrollHeight-a.scrollHeight)[0];
    if(newScroller) newScroller.scrollTop=prevScroll;
  }
  setTimeout(()=>{ try{lucide.createIcons();}catch(e){} },20);
}

// ─── AUTENTICAÇÃO REAL (Supabase) ───────────────────────────────────────────
function authNext(forceOnboarding){
  // Cadastro novo: sempre vai pro questionário de objetivos.
  // Login: vai pro app se já tem perfil; senão, questionário.
  const next=(!forceOnboarding && state.goal && state.tdee>0)?'main':'onboarding';
  // Ao logar, sempre abre na aba de início (não na aba que ficou salva de antes).
  setState({authed:true,screen:next,step:0,authMode:'login',tab:'home'});
}

function traduzErro(msg){
  if(/Invalid login credentials/i.test(msg)) return 'E-mail ou senha incorretos';
  if(/already registered|already been registered|already exists/i.test(msg)) return 'Este e-mail já tem conta. Tente entrar.';
  if(/Email not confirmed/i.test(msg)) return 'Confirme seu e-mail antes de entrar';
  if(/email rate limit|over_email_send/i.test(msg)) return 'Limite de e-mails atingido. Aguarde 1 hora ou desative a confirmação de e-mail no Supabase.';
  if(/rate limit|too many|429/i.test(msg)) return 'Muitas tentativas seguidas. Aguarde alguns minutos e tente de novo.';
  if(/network|fetch|failed to fetch/i.test(msg)) return 'Sem conexão com a internet';
  if(/password/i.test(msg)) return 'Senha inválida (mínimo 6 caracteres)';
  return msg;
}

async function doLogin(){
  const email=(document.getElementById('authEmailInput')?.value||'').trim();
  const pass=(document.getElementById('authPassInput')?.value||'').trim();
  if(!email||!pass){ showToast('Preencha e-mail e senha'); return; }
  if(!email.includes('@')){ showToast('E-mail inválido'); return; }
  if(!sb){ showToast('⚠️ Conexão indisponível'); return; }
  showToast('Entrando...');
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pass });
  if(error){ showToast('❌ '+traduzErro(error.message)); return; }
  currentUser = data.user;
  state.authEmail = email;
  await carregarPerfil();
  authNext();
}

async function doSignup(){
  const name=(document.getElementById('authNameInput')?.value||'').trim();
  const email=(document.getElementById('authEmailInput')?.value||'').trim();
  const pass=(document.getElementById('authPassInput')?.value||'').trim();
  if(!name||!email||!pass){ showToast('Preencha todos os campos'); return; }
  if(!email.includes('@')){ showToast('E-mail inválido'); return; }
  if(pass.length<6){ showToast('A senha precisa de ao menos 6 caracteres'); return; }
  if(!sb){ showToast('⚠️ Conexão indisponível'); return; }
  showToast('Criando conta...');
  const { data, error } = await sb.auth.signUp({
    email, password: pass,
    options:{ data:{ nome: name } }
  });
  if(error){ showToast('❌ '+traduzErro(error.message)); return; }
  // Se a confirmação de e-mail estiver ligada, não há sessão ainda
  if(!data.session){
    showToast('📧 Verifique seu e-mail para confirmar a conta');
    setState({authMode:'login'});
    return;
  }
  currentUser = data.user;
  // Conta nova: zera o perfil para começar o questionário do zero
  state.authEmail=email; state.authName=name; state.name=name;
  state.goal=null; state.tdee=0; state.targetCal=0;
  await salvarPerfil();
  showToast(`✅ Conta criada! Vamos montar seu perfil, ${esc(name.split(' ')[0])}`);
  authNext(true);
}

async function doSocialLogin(provider){
  if(!sb){ showToast('⚠️ Conexão indisponível'); return; }
  const { error } = await sb.auth.signInWithOAuth({
    provider, options:{ redirectTo: window.location.href }
  });
  if(error) showToast('❌ '+traduzErro(error.message));
}

function skipLogin(){
  state.authed=false;
  authNext();
}

// ─── SINCRONIZAÇÃO DE DADOS ─────────────────────────────────────────────────
async function carregarPerfil(){
  if(!currentUser || !sb) return;
  try {
    const { data, error } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    if(error || !data) return;
    if(data.app_state && Object.keys(data.app_state).length){
      Object.assign(state, data.app_state);
      // O estado da nuvem pode ser de um dia anterior (ou de outro aparelho).
      // Sem isso, as refeições de ontem voltariam depois da virada do dia.
      checkNovoDia();
      // Estados transientes nunca devem vir da nuvem (evita modal reabrir sozinho)
      Object.assign(state,{
        showActModal:false, showJunkModal:false, showWaterModal:false,
        showWeightModal:false, showAddMealModal:false, showUpgradeModal:false,
        showMultiModal:false, showImportModal:false, selFoodId:null,
        importStep:'upload', importPreview:null, importErro:'', importBusy:false
      });
    }
    state.name      = data.nome      || state.name;
    state.goal      = data.goal      || state.goal;
    state.weight    = data.weight    || state.weight;
    state.height    = data.height    || state.height;
    state.age       = data.age       || state.age;
    state.sex       = data.sex       || state.sex;
    state.activity  = data.activity  || state.activity;
    state.tdee      = data.tdee      || state.tdee;
    state.targetCal = data.target_cal|| state.targetCal;
    state.planTier  = data.plan_tier || 'free';   // servidor é a fonte da verdade
    state.aiGenMonth        = data.ai_gen_month   ?? state.aiGenMonth;
    state.aiDietGenCount    = data.ai_diet_count  ?? state.aiDietGenCount;
    state.aiWorkoutGenCount = data.ai_workout_count ?? state.aiWorkoutGenCount;
    saveState(state);
  } catch(e){ console.warn('carregarPerfil:', e.message); }
}

let _syncTimer=null;
async function salvarPerfil(){
  if(!currentUser || !sb) return;
  // NÃO enviamos plan_tier: o banco bloqueia o cliente de mudar o próprio plano.
  const safeState = {...state};
  delete safeState.planTier; delete safeState.planExpiry; delete safeState.premiumActive;
  const payload = {
    id: currentUser.id, email: currentUser.email, nome: state.name,
    goal: state.goal, sex: state.sex, age: state.age, weight: state.weight,
    height: state.height, activity: state.activity, restrictions: state.restrictions||[],
    tdee: state.tdee, target_cal: state.targetCal, app_state: safeState,
    ai_gen_month: state.aiGenMonth, ai_diet_count: state.aiDietGenCount||0,
    ai_workout_count: state.aiWorkoutGenCount||0
  };
  try { const { error } = await sb.from('profiles').upsert(payload);
    if(error) console.warn('salvarPerfil:', error.message);
  } catch(e){ console.warn('salvarPerfil:', e.message); }
}

function syncToCloud(){
  if(!currentUser) return;
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(salvarPerfil, 2000);
}

async function initAuth(){
  if(!sb) return;
  try {
    const { data } = await sb.auth.getSession();
    if(data.session){
      currentUser = data.session.user;
      await carregarPerfil();
      if(state.screen==='login'){
        state.authed=true;
        state.screen=(state.goal&&state.tdee>0)?'main':'onboarding';
        state.tab='home';   // ao logar, sempre abre no início
      }
      // Se voltou do pagamento, recarrega o plano e avisa
      if(location.search.includes('payment') || document.referrer.includes('abacatepay') || document.referrer.includes('mercadopago')){
        setTimeout(verificarPlanoAtivo, 1500);
      }
    }
    sb.auth.onAuthStateChange((event, session)=>{
      if(event==='SIGNED_IN' && session){
        currentUser = session.user;
        carregarPerfil().then(()=>{
          if(state.screen==='login'){
            setState({authed:true, screen:(state.goal&&state.tdee>0)?'main':'onboarding', tab:'home'});
          }
        });
      }
      if(event==='SIGNED_OUT'){ currentUser=null; }
    });
  } catch(e){ console.warn('initAuth:', e.message); }
}

// Helpers de plano
// ─── HELPERS DE PLANO ─────────────────────────────────────────────────────────
// free | dieta | dietatreino
function hasNutri(){ return state.planTier==='dieta'||state.planTier==='dietatreino'; }
function hasTreino(){ return state.planTier==='dietatreino'; }
function hasAI(){ return hasNutri(); } // compatibilidade com código existente
function hasVIP(){ return hasNutri(); }
function hasElite(){ return hasTreino(); }
function planLabel(){
  if(hasTreino()) return {text:'Dieta & Treino IA',bg:'linear-gradient(135deg,#14532d,#22c55e)',icon:'sparkles',short:'D&T'};
  if(hasNutri())  return {text:'Dieta IA',bg:'linear-gradient(135deg,#15803d,#4ade80)',icon:'leaf',short:'Dieta'};
  return                 {text:'Free',bg:'linear-gradient(135deg,#6b7280,#9ca3af)',icon:'zap',short:'Free'};
}

function renderMain(el){
  if(state.nutriScreen){ renderNutriScreen(el); return; }
  if(state.personalScreen){ renderPersonalScreen(el); return; }
  if(state.clientPortalScreen){ renderClientPortal(el); return; }

  const tabs=[
    {id:'home',    icon:'home',     label:'Início',  lock:false},
    {id:'search',  icon:'utensils-crossed', label:'Dieta', lock:!hasNutri()},
    {id:'activity',icon:'activity', label:'Atividade', lock:false},
    {id:'plan',    icon:'search',   label:'Alimentos', lock:false},
    {id:'premium', icon:'star',     label:'Planos',  lock:false}
  ];

  const tab=state.tab;
  const isLocked=tabs.find(t=>t.id===tab)?.lock;

  let content='';
  if(isLocked)               content=renderLockedFeature(tab);
  else if(tab==='home')      content=renderHome();
  else if(tab==='search')    content=renderPlan();   // aba "Dieta" → plano alimentar
  else if(tab==='activity')  content=renderActivity();
  else if(tab==='plan')      content=renderSearch(); // aba "Alimentos" → busca de alimentos
  else if(tab==='premium')   content=renderPremium();
  else if(tab==='progress')  content=renderProgress();
  else if(tab==='profile')   content=renderProfile();

  el.innerHTML=`
  <div class="h-full flex flex-col" style="background:var(--bg)">
    <div class="flex-1 overflow-auto pb-24">${content}</div>
    <nav class="nav-bar">
      ${tabs.map(t=>`
      <button onclick="setState({tab:'${t.id}',selFoodId:null,searchQ:''})" class="nav-btn ${tab===t.id?'active':''}" style="position:relative">
        <i data-lucide="${t.icon}" style="width:22px;height:22px${t.id==='premium'?';color:#22c55e':''}${t.lock?';opacity:.35':''}"></i>
        ${t.lock?`<span style="position:absolute;top:0;right:6px;font-size:8px;line-height:1">🔒</span>`:''}
        <span style="${t.id==='premium'?'color:var(--green)':''}${t.lock?';opacity:.35':''}">${t.label}</span>
      </button>`).join('')}
    </nav>
    ${renderWeightModal()}${renderWaterModal()}${renderActModal()}${renderJunkModal()}${renderAddMealModal()}${renderUpgradeModal()}${renderMultiModal()}${renderImportModal()}
  </div>`;
}

// ── Lista de resultados da busca (separada para atualizar sem destruir o input) ──
function buildSearchResults(){
  const cat=state.searchCat||'all';
  const q=state.searchQ||'';
  let filtered=q?FOODS.filter(f=>f.n.toLowerCase().includes(q.toLowerCase())):FOODS;
  if(cat!=='all') filtered=filtered.filter(f=>f.cat===cat);
  const showAll=state.showAllFoods||q||cat!=='all';
  const limit=showAll?filtered.length:30;
  const msel=state.multiSel||[];
  return `
      <p class="text-xs mb-3 font-semibold" style="color:var(--text-3)">${filtered.length} alimentos · adicionando em <b style="color:var(--green-dark)">${state.selMeal}</b></p>
      <div class="space-y-2">
        ${filtered.slice(0,limit).map((f,i)=>{
          const ci=CATINFO[f.cat]||{label:'',color:'#888'};
          const isSel=msel.some(s=>s.id===f.id);
          return `
          <div onclick="setState({selFoodId:${f.id},selGrams:100})" class="w-full text-left card p-4 fade-up" style="animation-delay:${Math.min(i,20)*12}ms;cursor:pointer">
            <div class="flex items-center justify-between mb-2">
              <div class="flex items-center gap-3" style="flex:1;min-width:0">
                <span class="text-2xl">${f.e||'🍽️'}</span>
                <div style="min-width:0">
                  <div class="font-bold text-sm" style="color:var(--text)">${f.n}</div>
                  <span class="catbadge" style="background:${ci.color}18;color:${ci.color}">${ci.label}</span>
                </div>
              </div>
              <div class="text-right flex-shrink-0 ml-2">
                <div class="font-extrabold text-lg" style="color:var(--green-dark)">${f.cal}</div>
                <div class="text-xs" style="color:var(--text-3)">kcal/100g</div>
              </div>
              <button onclick="event.stopPropagation();toggleMultiSel(${f.id})" aria-label="${isSel?'Remover da seleção':'Selecionar'}" class="flex-shrink-0 ml-3 flex items-center justify-center" style="width:32px;height:32px;border-radius:50%;border:2px solid ${isSel?'var(--green)':'var(--border)'};background:${isSel?'var(--green)':'transparent'};color:${isSel?'#fff':'var(--text-3)'};cursor:pointer;font-size:15px;font-weight:800;transition:all .15s;padding:0">${isSel?'✓':'+'}</button>
            </div>
            <div class="flex gap-3 text-xs font-semibold">
              <span style="color:#60a5fa">P ${f.p}g</span><span style="color:#fbbf24">C ${f.c}g</span><span style="color:#f87171">G ${f.g}g</span>
            </div>
          </div>`;
        }).join('')}
        ${filtered.length===0?`<div class="text-center py-12"><p class="text-sm" style="color:var(--text-3)">Nenhum alimento encontrado</p></div>`:''}
        ${(!showAll&&filtered.length>30)?`
        <button onclick="setState({showAllFoods:true})" class="w-full py-3 rounded-2xl font-bold text-sm mt-2 flex items-center justify-center gap-2" style="background:var(--green-light);color:var(--green-dark);border:none;cursor:pointer">
          <i data-lucide="list" style="width:16px;height:16px"></i> Ver todos os ${filtered.length} alimentos
        </button>`:''}
        ${(state.showAllFoods&&!q&&cat==='all'&&filtered.length>30)?`
        <button onclick="setState({showAllFoods:false})" class="w-full py-3 rounded-2xl font-bold text-sm mt-2 flex items-center justify-center gap-2" style="background:var(--bg2);color:var(--text-3);border:none;cursor:pointer">
          <i data-lucide="chevron-up" style="width:16px;height:16px"></i> Mostrar menos
        </button>`:''}
      </div>`;
}

// Atualiza APENAS a lista de resultados e a barra de seleção, sem destruir o
// campo de busca (evita o teclado do celular fechar a cada letra digitada).
function refreshSearch(){
  const box=document.getElementById('searchResults');
  if(box){
    box.innerHTML=buildSearchResults();
    setTimeout(()=>{ try{lucide.createIcons();}catch(e){} },10);
  }
  const bar=document.getElementById('mselBar');
  if(bar) bar.outerHTML=buildMultiSelBar();
}

// ── SELEÇÃO MÚLTIPLA DE ALIMENTOS ─────────────────────────────────────────────
function toggleMultiSel(foodId){
  const msel=[...(state.multiSel||[])];
  const i=msel.findIndex(s=>s.id===foodId);
  if(i>=0) msel.splice(i,1);
  else msel.push({id:foodId, grams:100});
  state.multiSel=msel;
  saveState(state);
  refreshSearch();   // atualização leve: não fecha teclado nem perde scroll
}

function buildMultiSelBar(){
  const msel=state.multiSel||[];
  if(!msel.length) return `<div id="mselBar"></div>`;
  const totalCal=msel.reduce((t,s)=>{
    const f=FOODS.find(x=>x.id===s.id); return t+(f?Math.round(f.cal*(s.grams||100)/100):0);
  },0);
  return `
  <div id="mselBar" style="position:sticky;bottom:0;z-index:40;padding:10px 20px calc(14px + env(safe-area-inset-bottom));background:linear-gradient(transparent,var(--bg) 30%)">
    <button onclick="setState({showMultiModal:true})" class="w-full py-4 rounded-2xl font-extrabold text-sm flex items-center justify-center gap-2" style="background:var(--green);color:#fff;border:none;cursor:pointer;box-shadow:0 8px 24px rgba(34,197,94,.35)">
      🧺 Adicionar ${msel.length} ${msel.length===1?'alimento':'alimentos'} · ${totalCal} kcal →
    </button>
  </div>`;
}

function setMultiGrams(foodId, delta){
  const msel=[...(state.multiSel||[])];
  const s=msel.find(x=>x.id===foodId);
  if(!s) return;
  s.grams=Math.max(25, Math.min(500, (s.grams||100)+delta));
  state.multiSel=msel;
  saveState(state);
  render();
}

function removeMultiSel(foodId){
  state.multiSel=(state.multiSel||[]).filter(s=>s.id!==foodId);
  if(!state.multiSel.length) state.showMultiModal=false;
  saveState(state);
  render();
}

              </div>
              <div class="text-right">
                <span class="font-extrabold" style="color:var(--green-dark)">${cal}</span>
                <span class="text-xs" style="color:var(--text-3)"> kcal</span>
              </div>
            </div>
          </div>`;
        }).join('')}
      </div>

      <button onclick="confirmarMultiAdd()" class="btn-green w-full py-4 text-base" style="border:none;cursor:pointer">
        ✓ Adicionar tudo em ${state.selMeal} · ${totalCal} kcal
      </button>
      <div style="height:calc(20px + env(safe-area-inset-bottom))"></div>

function confirmarMultiAdd(){
  const msel=state.multiSel||[];
  if(!msel.length) return;
  const today=hojeLocal();
  const weekLog=[...(state.weekLog||[])];
  let de=weekLog.find(w=>w.date===today);
  if(!de){de={date:today,cal:0,p:0,c:0,g:0};weekLog.push(de);}
  const log=[...state.todayLog];
  let totalCal=0, count=0;
  msel.forEach(s=>{
    const f=FOODS.find(x=>x.id===s.id);
    if(!f) return;
    const grams=s.grams||100;
    const cal=Math.round(f.cal*grams/100);
    const entry={
      name:f.n,cal,meal:state.selMeal,grams,
      p:Math.round(f.p*grams/100*10)/10,
      c:Math.round(f.c*grams/100*10)/10,
      g:Math.round(f.g*grams/100*10)/10,
      e:f.e||'🍽️',ts:Date.now()
    };
    log.push(entry);
    de.cal+=cal;de.p+=entry.p;de.c+=entry.c;de.g+=entry.g;
    totalCal+=cal;count++;
  });
  state.todayLog=log;
  state.weekLog=weekLog;
  state.multiSel=[];
  state.showMultiModal=false;
  saveState(state);
  render();
  showToast(`✓ ${count} ${count===1?'alimento':'alimentos'} · ${totalCal} kcal → ${state.selMeal}`);
}

// ══════════════ FOOD DETAIL — BUG CORRIGIDO ═══════════════════════════════════
// O botão de registrar agora é INLINE (não fixed), garantindo funcionamento
// em qualquer container, iframe ou webview sem problema de posicionamento.
function renderFoodDetail(food){

function abrirImportarDieta(){

// Lê o arquivo escolhido e dispara a extração
async function onImportFile(input){
  const file = input.files && input.files[0];
  if(!file) return;

  const MAX = 8 * 1024 * 1024; // 8MB
  if(file.size > MAX){
    setState({importErro:'Arquivo muito grande (máx. 8MB). Tente uma foto menor ou tire outra com menos zoom.'});
    return;
  }
  const tipo = file.type || '';
  const ehPdf = tipo === 'application/pdf' || /\.pdf$/i.test(file.name||'');
  const ehImg = /^image\//.test(tipo);
  if(!ehPdf && !ehImg){
    setState({importErro:'Formato não suportado. Envie uma foto (JPG/PNG) ou um PDF.'});
    return;
  }

  state.importErro='';
  state.importBusy=true;
  state.importStep='lendo';
  saveState(state); render();

  try{
    const b64 = await fileParaBase64(file);
    const rx = await extrairDietaIA(b64, ehPdf ? 'application/pdf' : tipo);
    if(!rx || !Array.isArray(rx.meals) || !rx.meals.length){
      throw new Error('Não consegui identificar as refeições nesse arquivo.');
    }
    state.importPreview = rx;
    state.importBusy=false;
    state.importStep='revisar';
    saveState(state); render();
  }catch(e){
    state.importBusy=false;
    state.importStep='upload';
    state.importErro = (e && e.message) ? e.message : 'Não consegui ler o arquivo. Tente uma foto mais nítida e bem iluminada.';
    saveState(state); render();
  }
}

function fileParaBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = ()=>{ try{ res(String(r.result).split(',')[1]); }catch(e){ rej(new Error('Falha ao ler o arquivo')); } };
    r.onerror = ()=>rej(new Error('Falha ao ler o arquivo'));
    r.readAsDataURL(file);
  });
}

// Envia a imagem/PDF para a IA (via worker) e pede o JSON estruturado
async function extrairDietaIA(base64, mediaType){
  const instrucao = `Você está lendo a PRESCRIÇÃO ALIMENTAR de um nutricionista (documento em português do Brasil).
Extraia fielmente o conteúdo e devolva SOMENTE um objeto JSON válido, sem markdown, sem comentários, exatamente neste formato:

{
  "nutriName": "nome do nutricionista se aparecer, senão \\"\\"",
  "crn": "número do CRN se aparecer, senão \\"\\"",
  "kcal": número de calorias diárias se aparecer (senão null),
  "prot": gramas de proteína/dia se aparecer (senão null),
  "carb": gramas de carboidrato/dia se aparecer (senão null),
  "fat": gramas de gordura/dia se aparecer (senão null),
  "orientacoes": "orientações gerais do nutricionista, se houver",
  "metas": ["metas ou recomendações listadas, se houver"],
  "meals": [
    {
      "nome": "Café da manhã",
      "horario": "07:00 (se aparecer, senão \\"\\")",
      "kcal": calorias da refeição se aparecer (senão null),
      "itens": ["1 fatia de pão integral", "2 ovos mexidos"],
      "subs": ["substituições sugeridas para essa refeição, se houver"]
    }
  ],
  "suplementos": [ { "nome": "Whey", "dose": "30g", "horario": "pós-treino" } ]
}

REGRAS IMPORTANTES:
- Copie os alimentos e QUANTIDADES exatamente como estão escritos (não invente, não arredonde, não converta unidades).
- Se algo estiver ilegível ou ausente, use "" ou null. NUNCA invente valores.
- Mantenha a ordem das refeições do documento.
- Responda APENAS o JSON.`;

  const conteudo = mediaType==='application/pdf'
    ? [{ type:'document', source:{ type:'base64', media_type:'application/pdf', data:base64 } }, { type:'text', text:instrucao }]
    : [{ type:'image',    source:{ type:'base64', media_type:mediaType,          data:base64 } }, { type:'text', text:instrucao }];

  const res = await fetch(AI_PROXY_URL, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:4000,
      messages:[{ role:'user', content:conteudo }]
    })
  });
  if(!res.ok) throw new Error('Falha ao processar (HTTP '+res.status+'). Tente novamente.');
  const data = await res.json();
  if(data.error) throw new Error(typeof data.error==='string'?data.error:(data.error.message||'Erro ao ler o documento'));
  const texto = (data.content||[]).map(b=>b.text||'').filter(Boolean).join('\n');
  return parseAIJson(texto);
}

  rx.meals.forEach(m=>{ m.itens = (m.itens||[]).map(s=>String(s).trim()).filter(Boolean); });

            <div class="text-center rounded-lg p-2" style="background:rgba(255,255,255,.6)"><div class="text-lg font-extrabold" style="color:#dc2626">${aiDiet.gorduraTotal}g</div><div class="text-[10px]" style="color:var(--text-3)">gordura</div></div>

        </div>
        <div class="p-4 space-y-3">
          ${(aiDiet.refeicoes||[]).map(r=>`
          <div class="rounded-xl p-3" style="background:rgba(255,255,255,.7)">
            <div class="flex items-center justify-between mb-2">
              <div class="font-bold text-sm" style="color:var(--green-dark)">${esc(r.nome)}${r.horario?' · '+esc(r.horario):''}</div>
              <span class="text-xs font-bold" style="color:var(--green-mid)">${r.kcal} kcal</span>
            </div>
            <div class="space-y-1">
              ${(r.itens||[]).map(it=>`
              <div class="flex items-start justify-between gap-2 text-xs" style="color:var(--text-2)">
                <div class="flex items-start gap-2"><div class="w-1.5 h-1.5 rounded-full mt-1 flex-shrink-0" style="background:var(--green)"></div>${esc(it.alimento)}</div>

          </div>`).join('')}

      <div class="card p-6 text-center" style="border-style:dashed;border-color:#86efac">
        <div class="text-4xl mb-3">🥗</div>
        <p class="font-bold text-sm mb-1" style="color:var(--text)">Dieta sob medida para você</p>
        <p class="text-xs mb-4" style="color:var(--text-3)">A IA monta um cardápio completo com base no seu objetivo, peso e meta calórica — seguindo as diretrizes da ISSN para proteína e distribuição de macros.</p>
        <button onclick="${state.aiDietLoading?'':'generateAIDiet()'}" ${state.aiDietLoading?'disabled':''} class="pulse-btn px-6 py-3 rounded-2xl font-bold text-white text-sm" style="background:linear-gradient(135deg,#15803d,#22c55e);border:none;cursor:${state.aiDietLoading?'wait':'pointer'}">
          🥗 Gerar minha dieta
        </button>
      </div>`}
    </div>

    <div class="flex items-center gap-2 mb-4">
      <div class="flex-1 h-px" style="background:var(--border)"></div>
      <span class="text-xs font-bold" style="color:var(--text-3)">OU PLANOS PRONTOS</span>
      <div class="flex-1 h-px" style="background:var(--border)"></div>

    <div class="flex gap-2 overflow-x-auto pb-2 mb-5">
      ${Object.entries(MEAL_PLANS).map(([k,p])=>`

    <div class="space-y-3 mb-6">

          <div class="flex items-center gap-2 text-sm" style="color:var(--text-2)">

    <div class="mb-6">

      🛒 Abrir lista de compras
    </button>

}

function renderShopping(){
  const gk=state.shopGoal||state.goal||'hyper';
  const plan=MEAL_PLANS[gk];
  const days=state.shopDays||7;
  const shopData=SHOP_BASE[gk]||SHOP_BASE.hyper;
  const checked=state.checkedItems||{};
  const qKey=days===7?'q7':days===15?'q15':'q30';

  // Contagem
  let total=0,done=0;
  Object.values(shopData).forEach(items=>items.forEach((_,i)=>{total++;if(checked[`${Object.keys(shopData).find(k=>shopData[k].includes(shopData[Object.keys(shopData).find(kk=>shopData[kk][i]===_)]))||''}-${i}`])done++;}));
  // Recontagem correta
  total=0;done=0;
  Object.entries(shopData).forEach(([cat,items])=>items.forEach((_,i)=>{total++;if(checked[`${cat}-${i}`])done++;}));
  const pct=total>0?Math.round(done/total*100):0;

  return `
  <div>
    <div class="px-5 pt-6 pb-3 sticky top-0 z-10" style="background:var(--bg)">
      <div class="flex items-center gap-3 mb-4">
        <button onclick="setState({planViewMode:'overview'})" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:var(--green-light)">
          <i data-lucide="arrow-left" style="color:var(--green-dark);width:18px;height:18px"></i>
        </button>
        <div class="flex-1">
          <h1 class="text-xl font-extrabold" style="color:var(--text)">Lista de Compras</h1>
          <p class="text-xs" style="color:var(--text-3)">${plan.name} · ${done}/${total} itens · ${pct}%</p>
        </div>
        <button onclick="setState({checkedItems:{}})" class="text-xs font-bold px-3 py-1.5 rounded-lg" style="background:var(--bg2);color:var(--text-3)">Limpar</button>
      </div>
      <!-- BARRA DE PROGRESSO -->
      <div class="pbh mb-3"><div class="pbf" style="width:${pct}%"></div></div>

      <!-- SELETOR DE PERÍODO -->
      <div class="flex gap-2 mb-3">
        <p class="text-xs font-bold self-center" style="color:var(--text-3)">Período:</p>
        ${[7,15,30].map(d=>`
        <button onclick="setState({shopDays:${d},checkedItems:{}})" class="px-4 py-2 rounded-full text-xs font-bold flex-1" style="background:${days===d?'var(--green)':'var(--green-light)'};color:${days===d?'white':'var(--green-dark)'}">
          ${d} dias
        </button>`).join('')}
      </div>

      <!-- SELETOR DE OBJETIVO -->
      <div class="flex items-center gap-2 mb-1">
        <p class="text-xs font-bold flex-shrink-0" style="color:var(--text-3)">Objetivo:</p>
        <div class="flex gap-2 overflow-x-auto pb-1">
          ${Object.entries(MEAL_PLANS).map(([k,p])=>`
          <button onclick="setState({shopGoal:'${k}',checkedItems:{}})" class="px-3 py-1.5 rounded-full text-xs font-bold whitespace-nowrap flex-shrink-0" style="background:${gk===k?'var(--green-mid)':'var(--bg2)'};color:${gk===k?'white':'var(--text-3)'}">
            ${p.name}
          </button>`).join('')}
        </div>
      </div>
    </div>

    <div class="px-5 pb-24">
      ${done===total&&total>0?`
      <div class="card p-5 mb-4 text-center fade-up" style="border-color:var(--green)">
        <div class="text-4xl mb-2">🎉</div>
        <p class="font-bold" style="color:var(--green-dark)">Lista completa!</p>
        <p class="text-xs mt-1" style="color:var(--text-3)">Tudo comprado. Boa semana!</p>
      </div>`:''}

      <!-- INFO DO PERÍODO -->
      <div class="rounded-xl p-3 mb-4 text-xs" style="background:var(--green-light);color:var(--green-dark)">
        📦 Quantidades calculadas para <b>${days} dias</b> do plano <b>${plan.name}</b>. Ajuste conforme o número de pessoas na casa.
      </div>

      ${Object.entries(SHOP_CAT_LBL).map(([cat,label])=>{
        const items=shopData[cat]||[];
        if(!items.length) return '';
        const catDone=items.filter((_,i)=>checked[`${cat}-${i}`]).length;
        return `
        <div class="mb-5 fade-up">
          <div class="flex items-center justify-between mb-2">
            <p class="text-xs font-bold uppercase tracking-wider" style="color:var(--text-3)">${label}</p>
            <span class="text-xs font-semibold" style="color:var(--text-3)">${catDone}/${items.length}</span>
          </div>
          ${items.map((item,idx)=>{
            const key=`${cat}-${idx}`;
            const isChecked=!!checked[key];
            const qty=item[qKey]||item.q7||'—';
            return `
            <div onclick="toggleShopItem('${cat}',${idx})" class="ci ${isChecked?'ck':''}">
              <div class="cb">
                <svg class="ci-icon" width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M2 6l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <div class="flex-1 min-w-0">
                <span class="text-sm font-semibold ci-lbl" style="color:var(--text)">${item.i}</span>
              </div>
              <div class="text-right flex-shrink-0">
                <span class="text-xs font-bold" style="color:${isChecked?'var(--text-3)':'var(--green-dark)'}">${qty}</span>
              </div>
            </div>`;
          }).join('')}
        </div>`;
      }).join('')}

      <div class="card p-4 fade-up" style="background:var(--green-light);border-color:var(--green-mid)">
        <p class="text-xs font-semibold" style="color:var(--green-dark)">
          💡 Toque em cada item para marcar como comprado. Troque o período para ver as quantidades ajustadas (7, 15 ou 30 dias).
        </p>
      </div>
    </div>
  </div>`;
}

// ══════════════ PROGRESS ══════════════════════════════════════════════════════
function renderProgress(){
  const wl=state.weekLog||[];
  const target=state.targetCal||2000;
  const last7=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=dataLocal(d);
    const e=wl.find(w=>w.date===ds);
    last7.push({day:['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'][d.getDay()],cal:e?e.cal:0});
  }
  const maxCal=Math.max(target,...last7.map(d=>d.cal),1);
  const weights=state.userWeights||[];
  const wChange=weights.length>=2?(weights[weights.length-1]-weights[0]).toFixed(1):'—';
  const {imc,cls,pesoIdealMin,pesoIdealMax}=calcIMC();
  const water=state.waterToday||0,wGoal=state.waterGoal||8;
  const wCalc=calcWaterGoal();

  const achievements=[
    {e:'🥇',l:'Primeira semana',p:Math.min(last7.filter(d=>d.cal>0).length/7*100,100)},
    {e:'💧',l:'Hidratação completa',p:Math.min(water/wGoal*100,100)},
    {e:'⚖️',l:'Peso registrado',p:weights.length>0?100:0},
    {e:'🎯',l:'Meta calórica',p:Math.min(last7.filter(d=>d.cal>0&&Math.abs(d.cal-target)<target*.15).length/7*100,100)}
  ];

  return `
  <div class="px-5 pt-6 pb-4">
    <div class="flex items-center gap-3 mb-1">
      <button onclick="setState({tab:'profile'})" class="w-9 h-9 rounded-full flex items-center justify-center" style="background:var(--green-light)">
        <i data-lucide="arrow-left" style="color:var(--green-mid);width:18px;height:18px"></i>
      </button>
      <h1 class="text-xl font-extrabold" style="color:var(--text)">Progresso</h1>
    </div>
    <p class="text-sm mb-6 ml-12" style="color:var(--text-3)">Sua evolução em tempo real</p>

    <div class="grid grid-cols-2 gap-3 mb-5">
      <div class="card p-4 text-center fade-up d1"><div class="text-2xl mb-1">⚖️</div><div class="text-2xl font-extrabold" style="color:var(--green-dark)">${weights.slice(-1)[0]||state.weight} kg</div><div class="text-xs mt-1" style="color:var(--text-3)">Atual${wChange!=='—'?` (${parseFloat(wChange)>0?'+':''}${wChange}kg)`:''}</div></div>
      <div class="card p-4 text-center fade-up d2"><div class="text-2xl mb-1">🎯</div><div class="text-2xl font-extrabold" style="color:var(--green-dark)">${last7.filter(d=>d.cal>0&&Math.abs(d.cal-target)<target*.15).length}/7</div><div class="text-xs mt-1" style="color:var(--text-3)">Dias na meta</div></div>
      <div class="card p-4 text-center fade-up d3"><div class="text-2xl mb-1">💧</div><div class="text-2xl font-extrabold" style="color:#60a5fa">${water}/${wGoal}</div><div class="text-xs mt-1" style="color:var(--text-3)">Copos hoje</div></div>
      <div class="card p-4 text-center fade-up d4"><div class="text-2xl mb-1">🔥</div><div class="text-2xl font-extrabold" style="color:#f97316">${last7.filter(d=>d.cal>0).length}</div><div class="text-xs mt-1" style="color:var(--text-3)">Dias ativos</div></div>
    </div>

    <!-- IMC -->
    <div class="card p-5 mb-4 fade-up d2">
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold" style="color:var(--text)">IMC & Peso Ideal</span>
        <span class="pill" style="background:${cls.color}18;color:${cls.color}">${cls.label}</span>
      </div>
      <div class="flex items-end gap-4 mb-4">
        <div><div class="text-4xl font-extrabold" style="color:var(--green-dark)">${imc}</div><div class="text-xs" style="color:var(--text-3)">seu IMC</div></div>
        <div class="flex-1 pb-1">
          <div class="imc-bar"><div class="imc-mk" style="left:calc(${Math.min(Math.max((parseFloat(imc)-15)/25*100,2),96)}% - 8px)"></div></div>
          <div class="flex justify-between text-[10px] mt-1" style="color:var(--text-3)"><span>15</span><span>18.5</span><span>25</span><span>30</span><span>40</span></div>
        </div>
      </div>
      <div class="rounded-xl p-3" style="background:var(--green-light)">
        <p class="text-xs font-semibold" style="color:var(--green-dark)">💡 Peso ideal: <b>${pesoIdealMin}–${pesoIdealMax} kg</b></p>
      </div>
    </div>

    <!-- META HÍDRICA DETALHADA -->
    <div class="card p-5 mb-4 fade-up d2" style="border-color:#60a5fa44">
      <div class="flex items-center gap-2 mb-3">
        <i data-lucide="droplets" style="color:#60a5fa;width:18px;height:18px"></i>
        <span class="text-sm font-bold" style="color:var(--text)">Sua meta hídrica personalizada</span>
      </div>
      <div class="flex gap-4 mb-3">
        <div class="text-center"><div class="text-3xl font-extrabold" style="color:#2563eb">${wCalc.copos}</div><div class="text-xs" style="color:var(--text-3)">copos/dia</div></div>
        <div class="text-center"><div class="text-3xl font-extrabold" style="color:#60a5fa">${wCalc.litros}L</div><div class="text-xs" style="color:var(--text-3)">por dia</div></div>
        <div class="flex-1">
          <div class="text-xs font-semibold mb-1" style="color:var(--text-3)">IMC ${wCalc.imc} · ${wCalc.mlPerKg}ml/kg</div>
          <div class="text-xs" style="color:var(--text-3)">${wCalc.formula}</div>
        </div>
      </div>
      <div class="pbh mb-2"><div class="pbf" style="width:${Math.min(water/wGoal*100,100)}%;background:linear-gradient(90deg,#60a5fa,#2563eb)"></div></div>
      <p class="text-xs mb-3" style="color:var(--text-3)">${water}/${wGoal} copos hoje · ${(water*.25).toFixed(2)}L de ${wCalc.litros}L</p>
      <div class="rounded-xl p-3 text-xs" style="background:#eff6ff;color:#1d4ed8">${wCalc.nota}</div>
    </div>

    <!-- GRÁFICO CALORIAS -->
    <div class="card p-5 mb-4 fade-up d3">
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold" style="color:var(--text)">Calorias da semana</span>
        <span class="pill">Meta: ${target}</span>
      </div>
      <div class="flex items-end gap-1.5" style="height:120px">
        ${last7.map(d=>{
          const h=d.cal>0?Math.max(d.cal/maxCal*100,8):4;
          const color=d.cal===0?'#e2f0e5':d.cal>target*1.1?'#fca5a5':'var(--green)';
          return `<div class="flex-1 flex flex-col items-center gap-1">
            <div class="w-full rounded-t-lg" style="height:${h}%;background:${color}"></div>
            <span class="text-[9px] font-semibold" style="color:var(--text-3)">${d.day}</span>
          </div>`;
        }).join('')}
      </div>
    </div>

    <!-- PESO -->
    <div class="card p-5 mb-4 fade-up d4">
      <div class="flex items-center justify-between mb-4">
        <span class="text-sm font-bold" style="color:var(--text)">Histórico de peso</span>
        <button onclick="setState({showWeightModal:true})" class="btn-ghost text-xs px-3 py-1.5">+ Registrar</button>
      </div>
      ${weights.length>=2?`
      <div class="flex items-end gap-1" style="height:80px;margin-bottom:8px">
        ${weights.slice(-8).map((w,i,arr)=>{
          const mn=Math.min(...arr),mx=Math.max(...arr);
          const h=mx===mn?50:Math.max((w-mn)/(mx-mn)*100,10);
          return `<div class="flex-1 rounded-t-lg" style="height:${h}%;background:var(--green);opacity:.8"></div>`;
        }).join('')}
      </div>
      <p class="text-xs" style="color:var(--text-3)">Início: ${weights[0]}kg → Atual: ${weights.slice(-1)[0]}kg ${wChange!=='—'?(parseFloat(wChange)>0?`<span style="color:#ef4444">+${wChange}kg</span>`:`<span style="color:var(--green-dark)">${wChange}kg</span>`):''}
      </p>`:`
      <div class="text-center py-6">
        <p class="text-sm mb-3" style="color:var(--text-3)">Registre seu peso para ver a evolução</p>
        <button onclick="setState({showWeightModal:true})" class="btn-green px-4 py-2 text-sm">Registrar agora</button>
      </div>`}
    </div>

    <!-- CONQUISTAS -->
    <div class="mb-4 fade-up d5">
      <h3 class="text-xs font-bold uppercase tracking-wider mb-3" style="color:var(--text-3)">Conquistas</h3>
      <div class="grid grid-cols-2 gap-3">
        ${achievements.map((a,i)=>{
          const unlocked=a.p>=80;
          return `<div class="card p-4 text-center" style="border-color:${unlocked?'var(--green)':'var(--border)'}">
            <div class="text-2xl mb-2">${a.e}</div>
            <div class="text-xs font-bold mb-2" style="color:var(--text)">${a.l}</div>
            <div class="pbh mb-1"><div class="pbf" style="width:${a.p}%"></div></div>
            <div class="text-[10px] font-semibold" style="color:${unlocked?'var(--green-dark)':'var(--text-3)'}">${Math.round(a.p)}%</div>
          </div>`;
        }).join('')}
      </div>
    </div>

    <button onclick="if(confirm('Resetar dados do dia?'))setState({todayLog:[],waterToday:0})" class="w-full py-3 text-sm font-semibold rounded-xl" style="background:var(--bg2);color:var(--text-3);border:1.5px solid var(--border)">
      Resetar dados do dia
    </button>
  </div>`;
}

const AI_GEN_LIMIT = 2; // gerações por mês por tipo (dieta / treino)

// Garante que o contador reseta a cada mês
function ensureGenMonth(){
  const mes = mesLocal(); // YYYY-MM
  if(state.aiGenMonth !== mes){
    state.aiGenMonth = mes;
    state.aiDietGenCount = 0;
    state.aiWorkoutGenCount = 0;
    saveState(state);
  }
}
function dietGensLeft(){ ensureGenMonth(); return Math.max(0, AI_GEN_LIMIT - (state.aiDietGenCount||0)); }
function workoutGensLeft(){ ensureGenMonth(); return Math.max(0, AI_GEN_LIMIT - (state.aiWorkoutGenCount||0)); }

// Chama a API da Anthropic para gerar conteúdo estruturado em JSON
// URL do proxy (Cloudflare Worker) que protege a chave da API e resolve o CORS.
// Para trocar de proxy no futuro, basta mudar esta linha.
const AI_PROXY_URL = "https://nutrimindia.tristoncomercial.workers.dev";

async function callAI(prompt, maxTokens){
  const res = await fetch(AI_PROXY_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      model:"claude-haiku-4-5-20251001",
      max_tokens:maxTokens||1500,
      messages:[{role:"user",content:prompt}]
    })
  });
  if(!res.ok){
    throw new Error('Falha na geração (HTTP '+res.status+')');
  }
  const data = await res.json();
  if(data.error){
    throw new Error(typeof data.error==='string'?data.error:(data.error.message||'Erro da IA'));
  }
  const text = (data.content||[]).map(b=>b.text||"").filter(Boolean).join("\n");
  return parseAIJson(text);
}

// Parser robusto: extrai e repara o JSON retornado pela IA
function parseAIJson(raw){
  if(!raw) throw new Error('Resposta vazia da IA');
  // Remove cercas de markdown
  let s = raw.replace(/```json/gi,'').replace(/```/g,'').trim();

  // Pega do primeiro { até o último } (descarta texto antes/depois)
  const first = s.indexOf('{');
  const last = s.lastIndexOf('}');
  if(first === -1) throw new Error('JSON não encontrado');
  if(last > first) s = s.slice(first, last+1);
  else s = s.slice(first); // truncado, sem } final

  // Tentativa 1: parse direto
  try { return JSON.parse(s); } catch(e){}

  // Tentativa 2: reparar JSON truncado
  let repaired = s;

  // Se terminou no meio de uma string (aspas ímpares), fecha a string
  const quotes = (repaired.match(/"/g)||[]).length;
  if(quotes % 2 !== 0) repaired += '"';

  // Remove vírgula/conteúdo pendente no final (ex.: ',"alim)
  repaired = repaired.replace(/,\s*"[^"]*$/,'').replace(/,\s*$/,'');

  // Fecha colchetes e chaves abertos, na ordem correta
  const stack = [];
  let inStr = false, esc = false;
  for(const ch of repaired){
    if(esc){ esc=false; continue; }
    if(ch === '\\'){ esc=true; continue; }
    if(ch === '"'){ inStr = !inStr; continue; }
    if(inStr) continue;
    if(ch === '{' || ch === '[') stack.push(ch);
    else if(ch === '}' || ch === ']') stack.pop();
  }
  if(inStr) repaired += '"';
  // Remove vírgula final antes de fechar
  repaired = repaired.replace(/,\s*$/,'');
  while(stack.length){
    const open = stack.pop();
    repaired += (open === '{') ? '}' : ']';
  }

  try { return JSON.parse(repaired); }
  catch(e){ throw new Error('JSON inválido após reparo'); }
}

// ─── GERADOR LOCAL DE DIETA (baseado no conhecimento científico embutido) ──────
// Monta uma dieta no MESMO formato da IA, sem chamar a API. Usado após as
// primeiras gerações com IA, variando refeições para parecer sempre novo.
function buildLocalDiet(){
  const goal = state.goal||'hyper';
  const sci = SCIENCE_BASE[goal]||SCIENCE_BASE.hyper;
  const target = state.targetCal||2000;
  const isVegan = goal==='vegan';

  const dist = [
    {nome:'Café da manhã', horario:'07:00', pct:0.25},
    {nome:'Lanche da manhã', horario:'10:00', pct:0.10},
    {nome:'Almoço', horario:'13:00', pct:0.30},
    {nome:'Lanche da tarde', horario:'16:00', pct:0.10},
    {nome:'Jantar', horario:'20:00', pct:0.25}
  ];

  const OPC = {
    cafe: isVegan
      ? [["Aveia 60g","Leite de soja 200ml","Banana 1un"],["Tapioca 2 col","Pasta de amendoim 20g","Mamão 100g"],["Pão integral 2 fatias","Tofu mexido 100g","Tomate"],["Smoothie de frutas 300ml","Granola 40g","Chia 15g"]]
      : [["Ovos mexidos 3un","Pão integral 2 fatias","Mamão 100g"],["Aveia 60g","Whey 30g","Banana 1un"],["Tapioca 2 col","Queijo branco 50g","Café com leite"],["Iogurte natural 170g","Granola 40g","Morango 100g"],["Crepioca 2 ovos","Queijo cottage 50g","Tomate"]],
    almoco: isVegan
      ? [["Arroz integral 150g","Lentilha 150g","Brócolis 100g","Azeite 10ml"],["Quinoa 120g","Grão-de-bico 150g","Abobrinha 100g"],["Arroz 150g","Feijão preto 150g","Tofu grelhado 120g","Salada"],["Macarrão integral 150g","Molho de tomate","Ervilha 100g"]]
      : [["Arroz integral 150g","Frango grelhado 200g","Brócolis 100g","Azeite 10ml"],["Arroz 150g","Patinho moído 180g","Feijão 100g","Salada"],["Batata doce 200g","Filé de peixe 180g","Legumes 150g"],["Arroz 120g","Frango desfiado 180g","Lentilha 100g","Couve"],["Macarrão 150g","Carne magra 180g","Molho de tomate","Salada"]],
    lanche: isVegan
      ? [["Pasta de amendoim 30g","Maçã 1un"],["Mix de castanhas 30g","Banana 1un"],["Vitamina de fruta com leite vegetal 300ml"],["Hummus 60g","Cenoura em palito"]]
      : [["Iogurte grego 170g","Castanhas 20g"],["Whey 30g","Banana 1un"],["Queijo branco 50g","Torrada integral"],["Iogurte natural 170g","Granola 30g"],["Ovo cozido 2un","Fruta 1un"]],
    jantar: isVegan
      ? [["Tofu grelhado 200g","Quinoa 100g","Espinafre 100g"],["Sopa de legumes com grão-de-bico 350g"],["Wrap integral","Pasta de grão-de-bico 100g","Salada"],["Arroz 120g","Feijão 120g","Legumes refogados 150g"]]
      : [["Salmão grelhado 180g","Batata doce 150g","Aspargos"],["Omelete 3 ovos","Salada verde","Azeite 5ml"],["Frango grelhado 180g","Purê de abóbora 150g"],["Tilápia 180g","Arroz integral 100g","Brócolis"],["Carne magra 160g","Legumes assados 200g"]]
  };

  const seed = (state.aiDietGenCount||0) + (state.localDietSeed||0);
  const pick = (arr)=> arr[seed % arr.length];
  const mapMeal = {'Café da manhã':'cafe','Lanche da manhã':'lanche','Almoço':'almoco','Lanche da tarde':'lanche','Jantar':'jantar'};

  let protTot=0, carbTot=0, gordTot=0;
  const refeicoes = dist.map((d)=>{
    const kcal = Math.round(target*d.pct);
    const opts = OPC[mapMeal[d.nome]];
    const itens = (d.nome==='Lanche da tarde') ? opts[(seed+1)%opts.length] : pick(opts);
    const pShare = goal==='slim'?0.40:(goal==='mass'?0.28:0.33);
    const gShare = 0.27;
    const cShare = 1 - pShare - gShare;
    const p = Math.round(kcal*pShare/4);
    const c = Math.round(kcal*cShare/4);
    const g = Math.round(kcal*gShare/9);
    protTot+=p; carbTot+=c; gordTot+=g;
    return {
      nome:d.nome, horario:d.horario, kcal,
      itens: itens.map(it=>({alimento:it, kcal:Math.round(kcal/itens.length)})),
      substituicoes: [pick(opts).slice(0,2).join(' + ')]
    };
  });

  return {
    objetivo: sci.objetivo,
    kcalTotal: target,
    proteinaTotal: protTot,
    carboTotal: carbTot,
    gorduraTotal: gordTot,
    baseCientifica: `Plano ajustado ao seu objetivo: ${sci.proteina.split('(')[0].trim()}.`,
    refeicoes
  };
}

    setState({aiDietWeek:diet, aiDietLoading:false, aiDietSelDay:0});

function generateAIWorkout(){
  setState({aiWorkoutLoading:true});

  setTimeout(()=>{
    const goal = state.goal||'hyper';
    const activity = state.activity||'moderate';
    const levelMap = {
      sedentary:'iniciante', light:'iniciante',
      moderate:'intermediario', active:'avancado', very_active:'avancado'
    };
    const level = levelMap[activity]||'intermediario';

    // Escolhe o plano certo
    // Se o usuário está em casa (sem equipamento), use plano casa
    // caso contrário usa o plano do objetivo
    const goalKey = goal==='slim'?'slim':goal==='mass'?'mass':'hyper';
    const planSet = WORKOUT_DB.planos[goalKey];
    const plan = planSet[level]||planSet['intermediario']||planSet['iniciante'];

    // Monta estrutura de semana
    const dias = (plan.dias||[]).map((dia,i)=>{
      // Aquecimento
      const wType = dia.warmupType||'geral';
      const warmupPool = WORKOUT_DB.warmup[wType]||WORKOUT_DB.warmup.geral;
      const aquecimento = warmupPool.slice(0,3);

      // Finalização
      const finalizacao = WORKOUT_DB.cooldown.slice(0,3);

      // Mapeia principal para formato correto
      const principal = (dia.principal||[]).map(ex=>({
        nome: ex.nome,
        emoji: ex.emoji||'💪',
        series: ex.series,
        reps: ex.reps,
        descanso: ex.descanso,
        execucao: ex.execucao||''
      }));

      return {
        dia: dia.dia,
        nome: dia.nome,
        grupoFoco: dia.grupoFoco,
        duracao: dia.duracao,
        kcalEstimada: dia.kcalEstimada,
        aquecimento,
        principal,
        finalizacao
      };
    });

    const week = {
      objetivo: {hyper:'Hipertrofia',slim:'Emagrecimento',mass:'Ganho de Massa'}[goal]||goal,
      nivel: {iniciante:'Iniciante',intermediario:'Intermediário',avancado:'Avançado'}[level]||level,

      planNome: plan.nome,
      planDesc: plan.descricao,
      refs: plan.refs,
      dias
    };

    setState({aiWorkoutWeek:week,aiWorkoutLoading:false,aiWeekSelDay:0});
    showToast(`✅ Semana gerada! ${dias.length} treinos · ${plan.nome}`);
  }, 1200);
}

}
