function renderActModal(){
  if(!state.showActModal) return '';
  const selCat=state.selActCat||'cardio';
  const selId=state.selActId;
  const selInt=state.selIntensidade||'moderado';
  const selMin=state.selMinutos||30;
  const actsInCat=ACTIVITIES.filter(a=>a.cat===selCat);
  const selAct=ACTIVITIES.find(a=>a.id===selId);
  const previewKcal=selAct?calcActKcal(selId,selInt,selMin):0;

  const intColors={leve:'#60a5fa',moderado:'var(--green)',intenso:'#ef4444'};
  const intDesc={leve:'Esforço baixo, dá pra conversar',moderado:'Esforço médio, respiração acelerada',intenso:'Esforço máximo, difícil falar'};

  return `
  <div class="modal-ov" style="align-items:flex-start;overflow-y:auto" onclick="if(event.target===this)setState({showActModal:false})">
    <div class="modal-box" style="border-radius:24px;max-height:92vh;overflow-y:auto;margin-top:8vh">
      <!-- HEADER -->
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-lg font-extrabold" style="color:var(--text)">🏋️ Registrar Treino</h2>
        <button onclick="setState({showActModal:false})" style="background:var(--bg2);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center">
          <i data-lucide="x" style="width:16px;height:16px;color:var(--text-3)"></i>
        </button>
      </div>

      <!-- PASSO 1: CATEGORIA -->
      <p class="text-xs font-bold uppercase tracking-wider mb-3" style="color:var(--text-3)">1 — Categoria</p>
      <div class="flex gap-2 overflow-x-auto pb-2 mb-4">
        ${Object.entries(ACT_CATS).map(([k,v])=>`
        <button onclick="setState({selActCat:'${k}',selActId:null})" class="px-3 py-2 rounded-full text-xs font-bold whitespace-nowrap flex-shrink-0" style="background:${selCat===k?'var(--green)':'var(--green-light)'};color:${selCat===k?'white':'var(--green-dark)'}">
          ${v.e} ${v.label}
        </button>`).join('')}
      </div>

      <!-- PASSO 2: ATIVIDADE -->
      <p class="text-xs font-bold uppercase tracking-wider mb-3" style="color:var(--text-3)">2 — Atividade</p>
      <div class="space-y-2 mb-4">
        ${actsInCat.map(act=>`
        <button onclick="setState({selActId:'${act.id}'})" class="act-cat-btn ${selId===act.id?'sel-cat':''}">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-3">
              <span class="text-xl">${act.e}</span>
              <span class="text-sm font-semibold" style="color:var(--text)">${act.name}</span>
            </div>
            <div class="text-xs text-right" style="color:var(--text-3)">
              MET ${act.met.leve}–${act.met.intenso}
              ${selId===act.id?`<i data-lucide="check-circle-2" style="color:var(--green);width:18px;height:18px;display:inline-block;vertical-align:middle;margin-left:6px"></i>`:''}
            </div>
          </div>
        </button>`).join('')}
      </div>

      ${selId?`
      <!-- PASSO 3: INTENSIDADE -->
      <p class="text-xs font-bold uppercase tracking-wider mb-3" style="color:var(--text-3)">3 — Intensidade</p>
      <div class="flex gap-2 mb-2" id="intBtns">
        ${['leve','moderado','intenso'].map(int=>`
        <button data-int="${int}" onclick="setIntensidade('${int}')" class="intensity-btn ${selInt===int?'sel':''}" style="${selInt===int?`background:${intColors[int]};border-color:${intColors[int]}`:`border-color:var(--border)`}">
          ${{leve:'😌 Leve',moderado:'💪 Moderado',intenso:'🔥 Intenso'}[int]}
        </button>`).join('')}
      </div>
      <p class="text-xs mb-4" style="color:var(--text-3)" id="intDescTxt">${intDesc[selInt]}</p>

      <!-- PASSO 4: DURAÇÃO -->
      <p class="text-xs font-bold uppercase tracking-wider mb-3" style="color:var(--text-3)">4 — Duração</p>
      <div class="flex items-center gap-3 mb-2">
        <button onclick="stepMinutos(-5)" class="btn-ghost w-10 h-10 rounded-full flex items-center justify-center text-lg">−</button>
        <input type="range" min="10" max="180" step="5" value="${selMin}" id="durRange" oninput="liveMinutos(+this.value)" onchange="setState({selMinutos:+this.value})" class="flex-1">
        <button onclick="stepMinutos(5)" class="btn-green w-10 h-10 rounded-full flex items-center justify-center text-lg">+</button>
      </div>
      <div class="flex gap-2 flex-wrap mb-4" id="durPresets">
        ${[15,20,30,45,60,90].map(m=>`
        <button data-min="${m}" onclick="setMinutosPreset(${m})" class="px-3 py-1 rounded-lg text-xs font-bold" style="background:${selMin===m?'var(--green)':'var(--bg2)'};color:${selMin===m?'white':'var(--text-3)'}">
          ${m}min
        </button>`).join('')}
      </div>

      <!-- PREVIEW -->
      <div class="rounded-2xl p-4 mb-5 text-center" style="background:linear-gradient(135deg,#fff7ed,#ffedd5);border:2px solid #fed7aa">
        <p class="text-xs font-semibold mb-1" style="color:#92400e">Estimativa de gasto calórico</p>
        <div class="text-4xl font-extrabold mb-1" style="color:#f97316"><span id="pvKcal">${previewKcal}</span></div>
        <p class="text-xs" style="color:#b45309">kcal · <span id="pvMin">${selMin}</span> min · ${selAct?.name} ${selInt}</p>
        <p class="text-[10px] mt-2" style="color:#d97706">MET ${selAct?.met[selInt]} × ${state.weight}kg × <span id="pvHrs">${(selMin/60).toFixed(2)}</span>h</p>
      </div>

      <!-- BOTÃO -->
      <button onclick="addActivity(state.selActId,state.selIntensidade,state.selMinutos)" class="btn-green w-full py-4 text-base pulse-btn">
        ✓ Registrar treino · <span id="pvBtnKcal">${previewKcal}</span> kcal
      </button>`:`
      <div class="text-center py-6" style="color:var(--text-3)">
        <p class="text-sm">Selecione uma atividade acima</p>
      </div>`}
    </div>
  </div>`;
}

      +'</div>'
      +(tier!=='free'?

          +'<div class="flex items-center gap-2 mb-2">'

          +'<p class="text-xs" style="color:var(--text-3)">Pague com cartão de crédito em um ambiente seguro. Cancele quando quiser.</p>'
        +'</div>'
      :'')
      +'<button onclick="confirmUpgrade()" class="w-full py-4 rounded-2xl font-extrabold text-sm text-white" style="background:'+info.grad+';border:none;cursor:pointer">'
        +(tier==='free'?'Confirmar':'Ir para o pagamento →')
      +'</button>'
      +'<button onclick="setState({showUpgradeModal:false})" class="btn-ghost w-full py-3 text-sm mt-3">Cancelar</button>'
    +'</div>'
  +'</div>';
}

async function confirmUpgrade(){
  const tier=state.upgradeTarget;

  // Plano grátis: muda na hora (não envolve pagamento)
  if(tier==='free'){
    setState({planTier:'free',planExpiry:null,showUpgradeModal:false,premiumActive:false});
    showToast('Plano alterado para Free');
    return;
  }

  // Plano pago: precisa estar logado (o pagamento se liga à conta)
  if(!currentUser){
    setState({showUpgradeModal:false});
    showToast('Crie sua conta antes de assinar');
    setState({screen:'login',authMode:'signup'});
    return;
  }

  showToast('Preparando pagamento...');
  try {
    const resp = await fetch(PAY_WORKER_URL + '/criar-assinatura', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({ email: currentUser.email, userId: currentUser.id })
    });
    const data = await resp.json();
    if(!resp.ok || !data.init_point){
      throw new Error(data.error || 'Falha ao criar assinatura');
    }
    // Redireciona para o checkout do AbacatePay (cartão de crédito)
    window.location.href = data.init_point;
  } catch(e){
    showToast('❌ '+(e.message||'Erro no pagamento'));
  }
}

// Verifica no Supabase se o plano já foi ativado (após voltar do pagamento)
async function verificarPlanoAtivo(){
  if(!currentUser || !sb) return;
  const eraFreeAntes = (state.planTier || 'free') === 'free';
  await carregarPerfil();   // recarrega o plan_tier do servidor
  if(state.planTier && state.planTier!=='free'){
    // Se acabou de virar assinante (era free e agora não é), mostra a comemoração
    if(eraFreeAntes && !state.celebracaoVista){
      setState({ celebracaoVista:true });
      mostrarCelebracao();
    } else {
      showToast('✅ Assinatura ativa! Bem-vindo ao Dieta IA');
    }
  }
}

function mostrarCelebracao(){
  // Remove qualquer celebração anterior
  document.getElementById('celebracao-ov')?.remove();

  const nome = (state.name||'').split(' ')[0] || '';
  const saudacao = nome ? `Parabéns, ${esc(nome)}!` : 'Parabéns!';

  // Gera confetes
  let confetes = '';
  const cores = ['#22c55e','#15803d','#4ade80','#facc15','#38bdf8','#fb7185'];
  for(let i=0;i<40;i++){
    const cor = cores[i % cores.length];
    const left = Math.random()*100;
    const delay = Math.random()*0.6;
    const dur = 2.2 + Math.random()*1.6;
    const size = 6 + Math.random()*7;
    const rot = Math.random()*360;
    confetes += `<span class="confete" style="left:${left}%;background:${cor};width:${size}px;height:${size*0.5}px;animation-delay:${delay}s;animation-duration:${dur}s;transform:rotate(${rot}deg)"></span>`;
  }

  const ov = document.createElement('div');
  ov.id = 'celebracao-ov';
  ov.className = 'modal-ov';
  ov.style.cssText = 'position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;background:rgba(6,20,12,.55);backdrop-filter:blur(4px);overflow:hidden';
  ov.innerHTML = `
    <div class="confete-wrap" style="position:absolute;inset:0;pointer-events:none;overflow:hidden">${confetes}</div>
    <div class="celebra-card" style="position:relative;max-width:360px;width:100%;background:var(--card,#fff);border-radius:24px;padding:32px 26px;text-align:center;box-shadow:0 24px 60px rgba(0,0,0,.35);animation:celebraPop .5s cubic-bezier(.18,.89,.32,1.28)">
      <div style="width:88px;height:88px;margin:0 auto 18px;border-radius:50%;background:linear-gradient(135deg,#22c55e,#15803d);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(34,197,94,.4)">
        <span style="font-size:44px">🎉</span>
      </div>
      <h2 style="font-size:24px;font-weight:800;color:var(--text,#14281d);margin-bottom:8px">${saudacao}</h2>
      <p style="font-size:15px;font-weight:600;color:var(--green-mid,#15803d);margin-bottom:6px">Sua assinatura está ativa! 🥗</p>
      <p style="font-size:14px;line-height:1.55;color:var(--text-3,#5b7065);margin-bottom:24px">
        Agora você tem acesso completo ao <b>Dieta IA</b>: planos alimentares personalizados, ajustes inteligentes e muito mais. Vamos começar sua transformação!
      </p>
      <button onclick="fecharCelebracao()" style="width:100%;padding:15px;border:none;border-radius:14px;background:linear-gradient(135deg,#22c55e,#15803d);color:#fff;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 6px 18px rgba(34,197,94,.35)">
        Começar agora →

    </div>`;
  document.body.appendChild(ov);

function fecharCelebracao(){
  const ov = document.getElementById('celebracao-ov');
  if(ov){ ov.style.animation='fadeOutCelebra .3s forwards'; setTimeout(()=>ov.remove(),300); }
  // Leva o usuário direto pro plano alimentar
  setState({ tab:'search', screen:'main' });
}

function activatePremiumCode(){
  const code=(document.getElementById('premiumCodeInput')?.value||state.premiumCode||'').trim().toUpperCase();
  if(!code){showToast('Digite um código válido');return;}
  const nutriClients=state.nutriClients||[];
  const nutriClient=nutriClients.find(c=>c.codigo&&c.codigo.toUpperCase()===code&&c.prescription);
  const personalClients=state.personalClients||[];
  const personalClient=personalClients.find(c=>c.codigo&&c.codigo.toUpperCase()===code&&c.workoutPlan);
  if(nutriClient&&personalClient){
    setState({premiumActive:true,premiumCode:code,prescription:nutriClient.prescription,planTier:'dietatreino',tab:'premium'});
    showToast('✅ Dieta & Treino IA ativado!');
  } else if(personalClient){
    setState({premiumActive:true,premiumCode:code,planTier:'dietatreino',tab:'activity'});
    showToast('✅ Plano com treino ativado!');
  } else if(nutriClient){
    setState({premiumActive:true,premiumCode:code,prescription:nutriClient.prescription,planTier:'dieta',tab:'premium'});
    showToast('✅ Plano Dieta IA ativado!');
  } else {
    showToast('❌ Código inválido ou não encontrado');
  }
}

function generateCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='NUTRI-';
  for(let i=0;i<4;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  code+='-';
  for(let i=0;i<4;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function saveNutriPrescription(clientIdx){
  // Coleta dados do cliente
  const nome=document.getElementById('nCliNome')?.value?.trim()||'';
  const objetivo=document.getElementById('nCliObj')?.value?.trim()||'';
  const codigo=(document.getElementById('nCliCod')?.value?.trim()||'').toUpperCase();
  const validade=document.getElementById('nCliVal')?.value?.trim()||'';

  // Dados do nutricionista
  const nutriName=document.getElementById('nNutrNome')?.value?.trim()||'';
  const crn=document.getElementById('nNutrCRN')?.value?.trim()||'';

  // Metas calóricas
  const kcal=parseInt(document.getElementById('nKcal')?.value)||0;
  const prot=parseInt(document.getElementById('nProt')?.value)||0;
  const carb=parseInt(document.getElementById('nCarb')?.value)||0;
  const fat=parseInt(document.getElementById('nFat')?.value)||0;

  // Orientações
  const orientacoes=document.getElementById('nOrient')?.value?.trim()||'';

  // Metas
  const metas=Array.from(document.querySelectorAll('.meta-input'))
    .map(el=>el.value.trim()).filter(v=>v);

  // Refeições
  const mealCards=Array.from(document.querySelectorAll('[id^="mealCard_"],.rx-meal-card'));
  const meals=mealCards.map(card=>({
    nome:card.querySelector('.meal-nome')?.value||'Refeição',
    horario:card.querySelector('.meal-horario')?.value||'',
    kcal:card.querySelector('.meal-kcal')?.value||'',
    itens:(card.querySelector('.meal-itens')?.value||'').split('\n').map(s=>s.trim()).filter(s=>s),
    subs:(card.querySelector('.meal-subs')?.value||'').split('\n').map(s=>s.trim()).filter(s=>s)
  }));

  // Suplementos
  const supCards=Array.from(document.querySelectorAll('[id^="supCard_"],.rx-sup-card'));
  const suplementos=supCards.map(card=>({
    nome:card.querySelector('.sup-nome')?.value||'',
    dose:card.querySelector('.sup-dose')?.value||'',
    horario:card.querySelector('.sup-horario')?.value||'',
    obs:card.querySelector('.sup-obs')?.value||''
  })).filter(s=>s.nome);

  // Restrições
  const restricoes=(document.getElementById('nRestr')?.value||'').split('\n').map(s=>s.trim()).filter(s=>s);

  const prescription={
    codigo,nutriName,crn,kcal,prot,carb,fat,
    orientacoes,metas,meals,suplementos,restricoes,
    validade,
    data:new Date().toLocaleDateString('pt-BR')
  };

  const clients=[...(state.nutriClients||[])];
  if(clientIdx>=0 && clientIdx<clients.length){
    clients[clientIdx]={...clients[clientIdx],nome,objetivo,codigo,prescription};
  } else {
    clients.push({nome,objetivo,codigo,prescription});
  }

  setState({nutriClients:clients,nutriSelClient:null,nutriDraft:{}});
  showToast('✅ Prescrição salva! Código: '+codigo);
}

function generatePersonalCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code='ELITE-';
  for(let i=0;i<4;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  code+='-';
  for(let i=0;i<4;i++) code+=chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function savePersonalWorkout(clientIdx){
  const nome=document.getElementById('pCliNome')?.value?.trim()||'';
  const objetivo=document.getElementById('pCliObj')?.value?.trim()||'';
  const codigo=(document.getElementById('pCliCod')?.value?.trim()||'').toUpperCase();
  const nivel=document.getElementById('pCliNivel')?.value||'Iniciante';
  const observacoes=document.getElementById('pObs')?.value?.trim()||'';

  const dayCards=Array.from(document.querySelectorAll('[id^="trainDay_"]'));
  const dias=dayCards.map(card=>{
    const exRows=Array.from(card.querySelectorAll('.exercise-row'));
    const exercicios=exRows.map(ex=>({
      emoji:ex.querySelector('.ex-emoji')?.value||'💪',
      nome:ex.querySelector('.ex-nome')?.value||'',
      series:parseInt(ex.querySelector('.ex-series')?.value)||3,
      reps:ex.querySelector('.ex-reps')?.value||'12',
      descanso:ex.querySelector('.ex-rest')?.value||'60s',
      dica:ex.querySelector('.ex-exec')?.value||ex.querySelector('.ex-dica')?.value||'',
      execucao:ex.querySelector('.ex-exec')?.value||ex.querySelector('.ex-dica')?.value||''
    })).filter(ex=>ex.nome);
    return {
      nome:card.querySelector('.day-nome')?.value||'Treino',
      foco:card.querySelector('.day-foco')?.value||'',
      warmup:card.querySelector('.day-warmup')?.value||'',
      exercicios,
      cooldown:card.querySelector('.day-cooldown')?.value||''
    };
  });

  const workoutPlan={dias,observacoes,data:new Date().toLocaleDateString('pt-BR')};
  const clients=[...(state.personalClients||[])];
  if(clientIdx>=0&&clientIdx<clients.length){
    clients[clientIdx]={...clients[clientIdx],nome,objetivo,codigo,nivel,workoutPlan};
  } else {
    clients.push({nome,objetivo,codigo,nivel,workoutPlan});
  }
  setState({personalClients:clients,personalSelClient:null,personalDraft:{}});
  showToast('✅ Planilha salva! Código: '+codigo);
}

                <div class="text-xs" style="color:var(--text-3)">${dia.foco||''}</div>
              </div>
              <span class="pill" style="background:#fee2e2;color:#dc2626">${(dia.exercicios||[]).length} exercícios</span>
            </div>
            ${dia.warmup?`<div class="text-xs mb-3 p-3 rounded-xl" style="background:var(--bg2);color:var(--text-2)"><b>🔥 Aquecimento:</b> ${dia.warmup}</div>`:''}
            <div class="space-y-3">
              ${(dia.exercicios||[]).map(ex=>`
              <div class="rounded-xl p-3" style="background:#fff5f5;border:1px solid #fecaca">
                <div class="flex items-center justify-between mb-1">
                  <div class="flex items-center gap-2">
                    <span class="text-lg">${ex.emoji||'💪'}</span>
                    <span class="font-bold text-sm" style="color:var(--text)">${ex.nome}</span>
                  </div>
                  <span class="text-xs font-bold" style="color:#dc2626">${ex.series}×${ex.reps} · ${ex.descanso}</span>
                </div>
                ${ex.execucao||ex.dica?`<p class="text-xs" style="color:var(--text-3)">${ex.execucao||ex.dica}</p>`:''}
              </div>`).join('')}
            </div>
            ${dia.cooldown?`<div class="text-xs mt-3 p-3 rounded-xl" style="background:var(--bg2);color:var(--text-2)"><b>🧘 Finalização:</b> ${dia.cooldown}</div>`:''}
          </div>`).join('')}
          `:`<div class="card p-8 text-center">
            <div class="text-4xl mb-3">⏳</div>
            <p class="font-semibold" style="color:var(--text)">Planilha sendo preparada</p>
            <p class="text-xs mt-1" style="color:var(--text-3)">Seu personal ainda está montando seu treino.</p>
          </div>`}
        </div>
      </div>
    </div>`;
  }
  setTimeout(()=>{try{lucide.createIcons();}catch(e){}},20);
}

function loginClientPortal(type){
  const code=(document.getElementById('clientCodeInput')?.value||'').trim().toUpperCase();
  const nome=(document.getElementById('clientNameInput')?.value||'').trim();
  if(!code||!nome){showToast('Preencha o código e seu nome');return;}

  let found=null;
  if(type==='nutri'){
    const clients=state.nutriClients||[];
    found=clients.find(c=>c.codigo&&c.codigo.toUpperCase()===code&&
      c.nome&&c.nome.toLowerCase().includes(nome.toLowerCase().split(' ')[0]));
  } else {
    const clients=state.personalClients||[];
    found=clients.find(c=>c.codigo&&c.codigo.toUpperCase()===code&&
      c.nome&&c.nome.toLowerCase().includes(nome.toLowerCase().split(' ')[0]));
  }

  if(found){
    setState({clientPortalAuth:true,clientPortalUser:found});
    showToast(`✅ Bem-vindo(a), ${found.nome.split(' ')[0]}!`);
  } else {
    showToast('❌ Código ou nome não encontrado');
  }
}

function renderPrescriptionContent(rx){
  if(!rx) return '<div class="card p-8 text-center"><div class="text-4xl mb-3">⏳</div><p class="font-semibold" style="color:var(--text)">Prescrição sendo elaborada</p><p class="text-xs mt-1" style="color:var(--text-3)">Seu nutricionista ainda está preparando seu plano.</p></div>';
  const mealEmojis={'Café da manhã':'☀️','Almoço':'🌤️','Lanche':'🌅','Jantar':'🌙','Ceia':'🌛'};
  return `
  <div class="space-y-4">
    <div class="card-dark p-5 fade-up text-white">
      <p class="text-xs font-bold opacity-60 uppercase tracking-wider mb-3">Meta prescrita</p>
      <div class="grid grid-cols-4 gap-3 text-center">
        <div><div class="text-2xl font-extrabold" style="color:#4ade80">${rx.kcal||'—'}</div><div class="text-[10px] opacity-60">kcal/dia</div></div>
        <div><div class="text-2xl font-extrabold" style="color:#60a5fa">${rx.prot||'—'}g</div><div class="text-[10px] opacity-60">proteína</div></div>
        <div><div class="text-2xl font-extrabold" style="color:#fbbf24">${rx.carb||'—'}g</div><div class="text-[10px] opacity-60">carb</div></div>
        <div><div class="text-2xl font-extrabold" style="color:#f87171">${rx.fat||'—'}g</div><div class="text-[10px] opacity-60">gordura</div></div>
      </div>
      <div class="mt-3 text-xs opacity-50">Nutricionista: ${rx.nutriName||'—'} · CRN ${rx.crn||'—'}</div>
    </div>
    ${rx.orientacoes?`<div class="rx-meta-card fade-up d1"><div class="flex items-center gap-2 mb-2"><i data-lucide="clipboard-list" style="color:#2563eb;width:16px;height:16px"></i><span class="font-bold text-sm" style="color:#1e3a5f">Orientações</span></div><p class="text-sm" style="color:#1e40af">${esc(rx.orientacoes)}</p></div>`:''}
    ${rx.metas&&rx.metas.length?`<div class="rx-meta-card fade-up d2"><div class="font-bold text-sm mb-2" style="color:#1e3a5f">🎯 Metas</div>${rx.metas.map(m=>`<div class="flex items-start gap-2 mb-1"><div class="w-1.5 h-1.5 rounded-full mt-1.5 flex-shrink-0" style="background:#2563eb"></div><span class="text-sm" style="color:#1e40af">${m}</span></div>`).join('')}</div>`:''}
    ${(rx.meals||[]).map(m=>`<div class="rx-meal-card fade-up"><div class="flex items-center gap-2 mb-2"><span>${mealEmojis[m.nome]||'🍽️'}</span><div class="font-bold text-sm" style="color:#14532d">${m.nome}${m.horario?' · '+m.horario:''}</div>${m.kcal?`<span class="ml-auto text-xs font-bold" style="color:var(--green-mid)">${m.kcal} kcal</span>`:''}</div>${(m.itens||[]).map(it=>`<div class="flex items-start gap-2 mb-1"><div class="w-1.5 h-1.5 rounded-full mt-1.5 flex-shrink-0" style="background:var(--green-mid)"></div><span class="text-sm" style="color:#166534">${it}</span></div>`).join('')}${m.subs&&m.subs.length?`<div class="mt-2 text-xs font-bold" style="color:#15803d">🔄 Substituições: ${m.subs.join(' · ')}</div>`:''}</div>`).join('')}
    ${rx.suplementos&&rx.suplementos.length?`<div class="fade-up"><p class="text-xs font-bold uppercase tracking-wider mb-2" style="color:var(--text-3)">💊 Suplementação</p>${rx.suplementos.map(s=>`<div class="rx-sup-card"><div class="flex items-center justify-between mb-1"><span class="font-bold text-sm" style="color:#581c87">${s.nome}</span>${s.dose?`<span class="text-xs px-2 py-0.5 rounded-full" style="background:#ede9fe;color:#7c3aed">${s.dose}</span>`:''}</div>${s.horario?`<div class="text-xs" style="color:#6d28d9">⏰ ${s.horario}</div>`:''}</div>`).join('')}</div>`:''}
  </div>`;
}

// ─── INIT ────────────────────────────────────────────────────────────────────
// Recalcula meta hídrica ao iniciar
if(state.screen==='main'){ const wc=calcWaterGoal(); state.waterGoal=wc.copos; saveState(state); }
// Normaliza plano: se o tier de treino está desativado, rebaixa para dieta
if(!FEATURES.planoTreino && state.planTier==='dietatreino'){ state.planTier='dieta'; saveState(state); }
ensureGenMonth();
// Vira o dia se necessário (00:00 hora local zera as refeições do dia)
checkNovoDia();
// Vigia a virada com o app aberto (a cada minuto) e quando volta do background
setInterval(()=>{ if(checkNovoDia()) render(); }, 60000);
document.addEventListener('visibilitychange', ()=>{
  if(!document.hidden && checkNovoDia()) render();
});
// Inicializa o histórico de navegação (botão voltar do navegador)
initHistory();
// Tenta restaurar a sessão do Supabase antes de desenhar; se falhar, desenha mesmo assim
if(sb){ initAuth().finally(render); } else { render(); }

// ── Registra o Service Worker (PWA instalável + offline) ──
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
